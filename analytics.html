<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave Analytics</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#000,#0a0a0f);
  color:white;
  text-align:center;
}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  font-size:28px;
  font-weight:bold;
  position:relative;
}
.menu-icon{
  font-size:28px;
  cursor:pointer;
}
.dropdown{
  display:none;
  position:absolute;
  top:70px;
  left:20px;
  background:rgba(0,0,0,0.9);
  border-radius:10px;
  padding:10px 0;
  min-width:180px;
  text-align:left;
  z-index:100;
}
.dropdown a{
  display:block;
  color:white;
  padding:10px 20px;
  text-decoration:none;
}
.dropdown a:hover{
  background: rgba(58,127,253,0.2);
}
h1{font-size:40px;margin-top:20px;}
.cards{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:20px;
  margin:40px auto;
  max-width:900px;
}
.card{
  background: linear-gradient(135deg,#3a7bfd,#a855f7);
  border-radius:15px;
  padding:20px;
  box-shadow:0 0 15px rgba(58,127,253,0.5);
  transition: 0.3s;
}
.card:hover{
  transform: scale(1.05);
}
.card h3{
  margin-bottom:10px;
}
.card p{
  font-size:24px;
  font-weight:bold;
}
footer{
  margin-top:50px;
  padding:20px 0;
  background:rgba(0,0,0,0.9);
  color:#aaa;
  text-align:center;
  font-size:14px;
}
footer a{
  color:#3a7bfd;
  text-decoration:none;
}
footer a:hover{
  text-decoration:underline;
}
</style>
</head>
<body>

<header>
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <div>LinkWave Analytics</div>
  <div class="dropdown" id="dropdownMenu">
    <a href="index.html" target="_blank">Home</a>
    <a href="submit.html" target="_blank">Submit Link</a>
    <a href="contact.html" target="_blank">Contact</a>
    <a href="terms.html" target="_blank">Terms & Policy</a>
  </div>
</header>

<h1>📊 Live Analytics</h1>
<div class="cards" id="analyticsCards">
  <!-- Dynamic analytics cards will appear here -->
</div>

<footer>
  Made in Sri Lanka 🇱🇰 <br>
  © 2026 LinkWave. All rights reserved. <br>
  Designed & Developed by <a href="https://VIMA.LK/" target="_blank">Gavesh</a>
</footer>

<script>
// Hamburger menu toggle
function toggleMenu(){
  const menu = document.getElementById('dropdownMenu');
  menu.style.display = (menu.style.display==="block")?"none":"block";
}
window.onclick = function(e){
  const menu = document.getElementById('dropdownMenu');
  if(!e.target.matches('.menu-icon')){
    if(menu.style.display==="block"){menu.style.display="none";}
  }
}

// Load analytics
function loadAnalytics(){
  const container = document.getElementById('analyticsCards');
  container.innerHTML = "";

  const links = JSON.parse(localStorage.getItem('linkwaveLinks')) || [];

  // Compute totals
  const totalRequests = links.length * 10 + Math.floor(Math.random()*100); // fake requests
  const totalVisitors = links.length * 5 + Math.floor(Math.random()*50);
  const totalJoins = links.reduce((acc,l)=>acc+(l.clicks||0),0);
  const totalLinks = links.length;
  const platformCount = {WhatsApp:0, Telegram:0, Other:0, Facebook:0};
  links.forEach(l=>{
    if(l.platform in platformCount) platformCount[l.platform]++;
    else platformCount.Other++;
  });

  const stats = [
    {title:"Today Requests", value: links.length*5 + Math.floor(Math.random()*50)},
    {title:"Today Visitors", value: links.length*3 + Math.floor(Math.random()*30)},
    {title:"Today Joins", value: links.reduce((a,l)=>a+(l.clicks||0),0)},
    {title:"Today Added Links", value: links.length},
    {title:"Total Requests", value: totalRequests},
    {title:"Total Visitors", value: totalVisitors},
    {title:"Total Joins", value: totalJoins},
    {title:"Total Links", value: totalLinks},
  ];

  stats.forEach(stat=>{
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<h3>${stat.title}</h3><p class="count" data-target="${stat.value}">0</p>`;
    container.appendChild(div);
  });

  // Platform Distribution
  Object.keys(platformCount).forEach(p=>{
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<h3>${p} Groups</h3><p class="count" data-target="${platformCount[p]}">0</p>`;
    container.appendChild(div);
  });

  // Animate counts
  const counters = document.querySelectorAll('.count');
  counters.forEach(counter=>{
    const updateCount = ()=>{
      const target = +counter.getAttribute('data-target');
      const count = +counter.innerText;
      const increment = Math.ceil(target/50);
      if(count < target){
        counter.innerText = count + increment;
        setTimeout(updateCount, 20);
      } else {
        counter.innerText = target;
      }
    }
    updateCount();
  });
}

window.onload = loadAnalytics;
</script>

</body>
</html>
