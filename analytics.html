<script>
// Load analytics from LocalStorage
const links = JSON.parse(localStorage.getItem('linkwaveLinks')) || [];

let todayRequests = links.length; // All submissions today
let todayVisitors = parseInt(localStorage.getItem('totalVisitors')||0);
let todayJoins = links.reduce((acc,l)=>acc+(l.joins||0),0);
let todayLinks = links.length;

let totalRequests = todayRequests; // Can expand with historical if needed
let totalVisitors = todayVisitors;
let totalJoins = todayJoins;
let totalLinks = links.length;

let whatsappCount = links.filter(l=>l.platform==="WhatsApp").length;
let telegramCount = links.filter(l=>l.platform==="Telegram").length;
let otherCount = links.filter(l=>l.platform!=="WhatsApp" && l.platform!=="Telegram").length;
let facebookCount = links.filter(l=>l.platform==="Facebook").length;

document.getElementById('todayRequests').innerText = todayRequests;
document.getElementById('todayVisitors').innerText = todayVisitors;
document.getElementById('todayJoins').innerText = todayJoins;
document.getElementById('todayLinks').innerText = todayLinks;

document.getElementById('totalRequests').innerText = totalRequests;
document.getElementById('totalVisitors').innerText = totalVisitors;
document.getElementById('totalJoins').innerText = totalJoins;
document.getElementById('totalLinks').innerText = totalLinks;

document.getElementById('whatsappCount').innerText = whatsappCount;
document.getElementById('telegramCount').innerText = telegramCount;
document.getElementById('otherCount').innerText = otherCount;
document.getElementById('facebookCount').innerText = facebookCount;
</script>
