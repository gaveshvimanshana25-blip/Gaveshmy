<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave Live Analytics</title>

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"
/>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#050508,#000);
  color:white;
  text-align:center;
}

/* Header */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(0,0,0,0.85);
  position:sticky;
  top:0;
  z-index:100;
}
.menu-icon{
  font-size:28px;
  cursor:pointer;
}
.dropdown{
  display:none;
  position:absolute;
  top:55px;
  left:15px;
  background:rgba(0,0,0,0.95);
  border:1px solid #333;
  border-radius:10px;
  padding:10px 0;
  min-width:180px;
  text-align:left;
  z-index:1000;
}
.dropdown a{
  display:block;
  color:white;
  padding:10px 20px;
  text-decoration:none;
}
.dropdown a:hover{
  background:rgba(58,127,253,0.2);
}

/* Logo */
.logo{
  width:50px;
  height:50px;
  border-radius:50%;
  box-shadow:0 0 15px #3a7bfd;
  animation:logoGlow 3s infinite alternate;
}
@keyframes logoGlow{
  0%{box-shadow:0 0 10px #3a7bfd}
  100%{box-shadow:0 0 30px #a855f7}
}

/* Title */
.title{
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(45deg,#3a7bfd,#a855f7);
  -webkit-background-clip:text;
  color:transparent;
  animation:waveText 3s infinite;
}
@keyframes waveText{
  0%{letter-spacing:1px}
  50%{letter-spacing:5px}
  100%{letter-spacing:1px}
}

/* Hero */
.hero{
  margin-top:20px;
  padding:10px;
}
.hero h1{
  font-size:28px;
}
.hero p{
  color:#aaa;
  max-width:600px;
  margin:auto;
}

/* Map */
#visitorMap{
  height:400px;
  width:90%;
  max-width:1200px;
  margin:20px auto;
  border-radius:12px;
  border:1px solid rgba(58,127,253,0.5);
}

/* Stats cards */
.stats-container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
  margin:20px;
}
.stat-card{
  background:rgba(58,127,253,0.1);
  padding:15px 25px;
  border-radius:15px;
  width:200px;
  text-align:center;
  box-shadow:0 0 15px #3a7bfd;
  transition:0.3s;
}
.stat-card:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px #a855f7;
}
.stat-card h2{
  font-size:24px;
  margin:5px 0;
}

/* Footer */
footer{
  margin-top:30px;
  padding:20px;
  background:#000;
  color:#aaa;
}
</style>
</head>
<body>

<header>
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <div><img class="logo" src="https://raw.githubusercontent.com/gaveshvimanshana25-blip/Gaveshmy/refs/heads/main/file_00000000fc0c72088645a465db760c82.png"></div>
  <div class="title">LinkWave</div>

  <div class="dropdown" id="dropdownMenu">
    <a href="index.html">Home</a>
    <a href="submit.html">Submit Link</a>
    <a href="analytics.html">Live Analytics</a>
    <a href="developer.html">Developer</a>
    <a href="contact.html">Contact</a>
  </div>
</header>

<div class="hero">
  <h1>Live Analytics Dashboard</h1>
  <p>Track your visitors in real-time with map and stats.</p>
</div>

<!-- Stats Cards -->
<div class="stats-container">
  <div class="stat-card">
    <h2 id="visitorCount">1234</h2>
    <p>Live Visitors</p>
  </div>
  <div class="stat-card">
    <h2 id="countriesCount">15</h2>
    <p>Countries</p>
  </div>
  <div class="stat-card">
    <h2 id="activeSessions">76</h2>
    <p>Active Sessions</p>
  </div>
</div>

<!-- World Map -->
<h2>🌍 Visitor Map</h2>
<div id="visitorMap"></div>

<footer>
  Made in Sri Lanka 🇱🇰 <br>
  © 2026 LinkWave
</footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>
// Menu toggle
function toggleMenu(){
  const menu=document.getElementById("dropdownMenu");
  menu.style.display=(menu.style.display==="block")?"none":"block";
}
window.onclick=function(e){
  if(!e.target.matches('.menu-icon')){
    const menu=document.getElementById("dropdownMenu");
    if(menu.style.display==="block") menu.style.display="none";
  }
}

// Initialize Leaflet map
const map = L.map("visitorMap").setView([20, 0], 2);

// OpenStreetMap Tiles
L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '&copy; <a href="https://openstreetmap.org/copyright">OSM</a>'
}).addTo(map);

// Sample visitor data (simulate)
const visitors = [
  { coords: [6.9271, 79.8612], country: "Sri Lanka" },
  { coords: [28.6139, 77.2090], country: "India" },
  { coords: [37.0902, -95.7129], country: "USA" },
  { coords: [51.5074, -0.1278], country: "UK" },
  { coords: [48.8566, 2.3522], country: "France" },
];

// Add markers
visitors.forEach(v=>{
  L.circleMarker(v.coords, {
    radius:8,
    fillColor:"#3a7bfd",
    color:"#fff",
    weight:1,
    fillOpacity:0.8
  }).bindPopup(v.country).addTo(map);
});
</script>

</body>
</html>
