<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(180deg,#050508,#000);
overflow-x:hidden;
}

/* floating background */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#3a7bfd22,#000 70%);
animation:bgMove 20s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{transform:translate(0,0)}
50%{transform:translate(-20%, -20%)}
100%{transform:translate(0,0)}
}

/* header */

header{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
padding:20px;
}

/* logo */

.logo{
width:60px;
height:60px;
border-radius:50%;
box-shadow:0 0 15px #3a7bfd;
animation:logoGlow 3s infinite alternate;
}

@keyframes logoGlow{
0%{box-shadow:0 0 10px #3a7bfd}
100%{box-shadow:0 0 30px #a855f7}
}

/* animated title */

.title{
font-size:40px;
font-weight:bold;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
-webkit-background-clip:text;
color:transparent;
animation:waveText 3s infinite;
}

@keyframes waveText{
0%{letter-spacing:1px}
50%{letter-spacing:5px}
100%{letter-spacing:1px}
}

/* hero */

.hero{
margin-top:40px;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s forwards;
}

.hero p{
color:#aaa;
max-width:600px;
margin:auto;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* submit button */

.main-btn{
display:inline-block;
margin-top:25px;
padding:14px 28px;
border-radius:30px;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
color:white;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 20px #3a7bfd;
transition:0.3s;
}

.main-btn:hover{
transform:scale(1.1);
box-shadow:0 0 35px #a855f7;
}

/* search */

.search{
margin-top:40px;
}

.search input{
padding:12px;
width:240px;
border-radius:10px;
border:none;
}

/* categories */

#categoryScroll{
margin-top:25px;
display:flex;
justify-content:center;
gap:10px;
overflow-x:auto;
padding:10px;
}

#categoryScroll div{
padding:8px 20px;
background:rgba(58,127,253,0.2);
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

#categoryScroll div:hover{
transform:scale(1.15);
background:linear-gradient(45deg,#3a7bfd,#a855f7);
}

/* sub category */

#subCategoryScroll{
margin-top:10px;
display:flex;
justify-content:center;
gap:10px;
overflow-x:auto;
padding:10px;
}

#subCategoryScroll div{
padding:8px 20px;
background:rgba(168,85,247,0.2);
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

#subCategoryScroll div:hover{
transform:scale(1.1);
}

/* cards */

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:40px;
}

.card{
width:220px;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
transition:0.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 10px 25px rgba(58,127,253,0.5);
}

.card img{
width:100%;
border-radius:10px;
}

.join{
display:inline-block;
margin-top:10px;
padding:8px 16px;
border-radius:20px;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
color:white;
text-decoration:none;
}

/* footer */

footer{
margin-top:50px;
padding:20px;
background:#000;
color:#aaa;
}

</style>
</head>

<body>

<header>

<img class="logo" src="https://cdn-icons-png.flaticon.com/512/942/942748.png">

<div class="title">LinkWave</div>

</header>

<div class="hero">

<h1>Discover and Join Communities</h1>

<p>Find WhatsApp, Telegram, Facebook groups shared by the community.</p>

<a class="main-btn" href="submit.html">+ Submit Link</a>

</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Search groups...">
</div>

<div id="categoryScroll">

<div data-platform="All">All</div>
<div data-platform="WhatsApp">WhatsApp</div>
<div data-platform="Telegram">Telegram</div>
<div data-platform="Facebook">Facebook</div>

</div>

<div id="subCategoryScroll"></div>

<div class="cards" id="cardsContainer"></div>

<footer>

Made in Sri Lanka 🇱🇰 <br>
© 2026 LinkWave

</footer>

<script>

let currentPlatform="All"
let currentCategory="All"

function loadLinks(){

const container=document.getElementById("cardsContainer")
container.innerHTML=""

const links=JSON.parse(localStorage.getItem("linkwaveLinks"))||[]

links.reverse().forEach(link=>{

if(
(currentPlatform==="All"||link.platform===currentPlatform) &&
(currentCategory==="All"||link.category===currentCategory)
){

const card=document.createElement("div")

card.className="card"

card.innerHTML=`
${link.logo?`<img src="${link.logo}">`:''}
<h3>${link.name}</h3>
<p>${link.description}</p>
<a class="join" href="${link.url}" target="_blank">Join</a>
`

container.appendChild(card)

}

})

}

function loadSubCategories(platform){

const sub=document.getElementById("subCategoryScroll")

sub.innerHTML=""

let categories=[]

if(platform==="WhatsApp"){
categories=["All","Movies","Fun","Gaming","Education","Tech"]
}

else if(platform==="Telegram"){
categories=["All","Movies","Crypto","Anime","Gaming"]
}

else if(platform==="Facebook"){
categories=["All","Movies","Fun","Business","News"]
}

else{
categories=["All"]
}

categories.forEach(cat=>{

const btn=document.createElement("div")
btn.innerText=cat

btn.onclick=function(){
currentCategory=cat
loadLinks()
}

sub.appendChild(btn)

})

}

document.querySelectorAll("#categoryScroll div").forEach(btn=>{

btn.onclick=function(){

currentPlatform=this.dataset.platform
currentCategory="All"

loadSubCategories(currentPlatform)
loadLinks()

}

})

window.onload=function(){

loadSubCategories("All")
loadLinks()

}

</script>

</body>
</html>
