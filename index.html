<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background: linear-gradient(180deg,#0a0a0f,#000);
background-size:400% 400%;
animation:gradientBG 15s ease infinite;
}

/* header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
font-size:28px;
font-weight:bold;
position:relative;
}

.menu-icon{
font-size:28px;
cursor:pointer;
}

.dropdown{
display:none;
position:absolute;
top:70px;
left:20px;
background:#000;
border:1px solid #333;
border-radius:10px;
min-width:180px;
}

.dropdown a{
display:block;
padding:10px 20px;
color:white;
text-decoration:none;
}

.dropdown a:hover{
background:#222;
}

/* hero */

h1{
font-size:40px;
margin-top:20px;
}

p{
color:#aaa;
max-width:600px;
margin:auto;
}

.main-btn{
display:inline-block;
margin-top:25px;
padding:14px 28px;
border-radius:30px;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
color:white;
text-decoration:none;
font-weight:bold;
}

/* search */

.search{
margin-top:40px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.search input{
padding:12px;
width:220px;
border-radius:10px;
border:none;
}

/* category */

#categoryScroll{
margin-top:20px;
display:flex;
overflow-x:auto;
gap:15px;
padding:10px 20px;
}

#categoryScroll div{
flex:0 0 auto;
padding:8px 18px;
background:rgba(58,127,253,0.2);
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

#categoryScroll div:hover{
background:linear-gradient(45deg,#3a7bfd,#a855f7);
}

/* cards */

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:40px;
gap:20px;
}

.card{
width:220px;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
}

.card img{
width:100%;
border-radius:10px;
}

.join{
display:inline-block;
margin-top:10px;
padding:8px 16px;
border-radius:20px;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
color:white;
text-decoration:none;
}

/* footer */

footer{
margin-top:50px;
padding:20px;
background:#000;
color:#aaa;
}

footer a{
color:#3a7bfd;
text-decoration:none;
}

/* scroll progress */

#scrollProgress{
position:fixed;
top:0;
left:0;
height:4px;
width:0%;
background:linear-gradient(90deg,#3a7bfd,#a855f7);
z-index:999;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

</style>
</head>

<body>

<div id="scrollProgress"></div>

<header>

<div class="menu-icon" onclick="toggleMenu()">☰</div>
<div>LinkWave</div>

<div class="dropdown" id="dropdownMenu">
<a href="contact.html">Contact</a>
<a href="terms.html">Terms</a>
<a href="developer.html">Developer</a>
<a href="analytics.html">Analytics</a>
</div>

</header>

<h1>Discover and Join the Best Communities</h1>
<p>Find WhatsApp, Telegram, Facebook groups shared by the community.</p>

<a class="main-btn" href="submit.html">+ Submit Your Link</a>

<div class="search">
<input type="text" id="searchInput" placeholder="Search groups...">
</div>

<div id="categoryScroll">

<div data-platform="All">All</div>
<div data-platform="WhatsApp">WhatsApp</div>
<div data-platform="Telegram">Telegram</div>
<div data-platform="Facebook">Facebook</div>
<div data-platform="TikTok">TikTok</div>

</div>

<div class="cards" id="cardsContainer"></div>

<footer>

Made within Sri Lanka 🇱🇰 <br>
© 2026 LinkWave <br>
Designed by <a href="https://VIMA.LK/">Gavesh</a>

</footer>

<script>

/* menu */

function toggleMenu(){
const menu=document.getElementById("dropdownMenu");
menu.style.display=menu.style.display==="block"?"none":"block";
}

/* load links */

function loadLinks(filter="All"){

const container=document.getElementById("cardsContainer");

container.innerHTML="";

const links=JSON.parse(localStorage.getItem("linkwaveLinks"))||[];

links.reverse().forEach(link=>{

if(filter==="All"||link.platform===filter){

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
${link.logo?`<img src="${link.logo}">`:''}
<h3>${link.name}</h3>
<p>${link.description}</p>
<a class="join" href="${link.url}" target="_blank">Join</a>
`;

container.appendChild(card);

}

});

}

/* category click */

document.querySelectorAll("#categoryScroll div").forEach(btn=>{

btn.onclick=function(){

const platform=this.dataset.platform;

loadLinks(platform);

}

});

/* search */

document.getElementById("searchInput").addEventListener("input",function(){

const term=this.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

const text=card.querySelector("h3").textContent.toLowerCase();

card.style.display=text.includes(term)?"block":"none";

});

});

/* scroll progress */

window.onscroll=function(){

const winScroll=document.body.scrollTop||document.documentElement.scrollTop;

const height=document.documentElement.scrollHeight-document.documentElement.clientHeight;

const scrolled=(winScroll/height)*100;

document.getElementById("scrollProgress").style.width=scrolled+"%";

};

/* start */

window.onload=function(){

loadLinks("All");

};

</script>

</body>
</html>
