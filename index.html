<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave</title>

<style>
/* -------------------- GENERAL -------------------- */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#000000,#0a0a0f);
  color:white;
  text-align:center;
}

/* -------------------- HEADER -------------------- */
header{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  font-size:28px;
  font-weight:bold;
}

/* -------------------- TITLE -------------------- */
h1{
  font-size:40px;
  margin-top:20px;
}

p{
  color:#aaa;
  max-width:600px;
  margin:auto;
}

/* -------------------- BUTTON -------------------- */
.main-btn{
  display:inline-block;
  margin-top:25px;
  padding:14px 28px;
  border-radius:30px;
  background:linear-gradient(45deg,#3a7bfd,#a855f7);
  color:white;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 0 20px rgba(120,80,255,0.7);
}

/* -------------------- SEARCH -------------------- */
.search{
  margin-top:40px;
}

.search input{
  padding:12px;
  width:220px;
  border-radius:10px;
  border:none;
}

.search select{
  padding:12px;
  border-radius:10px;
  border:none;
}

/* -------------------- CARDS -------------------- */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:40px;
  gap:20px;
}

.card{
  width:220px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
}

.join{
  display:inline-block;
  margin-top:10px;
  padding:8px 16px;
  border-radius:20px;
  background:linear-gradient(45deg,#3a7bfd,#a855f7);
  text-decoration:none;
  color:white;
  font-size:14px;
}
</style>
</head>

<body>

<header>
LinkWave
</header>

<h1>Discover and Join the Best Communities</h1>

<p>
Find WhatsApp, Telegram and social groups shared by the community.
</p>

<a class="main-btn" href="#">+ Submit Your Link</a>

<div class="search">
  <input type="text" placeholder="Search groups...">
  <select>
    <option>Newest First</option>
    <option>Popular</option>
    <option>WhatsApp</option>
    <option>Telegram</option>
  </select>
</div>

<div class="cards">

  <div class="card">
    <h3>Movie Fans</h3>
    <p>Telegram movie discussion group</p>
    <a class="join" href="#">Join</a>
  </div>

  <div class="card">
    <h3>Tech Updates</h3>
    <p>Latest tech news community</p>
    <a class="join" href="#">Join</a>
  </div>

  <div class="card">
    <h3>Gaming Hub</h3>
    <p>Gamers chat and share tips</p>
    <a class="join" href="#">Join</a>
  </div>

</div>

</body>
</html>
