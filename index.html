<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINKwave</title>
<style>
/* === General Styles === */
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#fff;
}
a { text-decoration:none; }

/* === Header === */
header {
  display:flex;
  justify-content: space-between;
  align-items:center;
  padding:15px 20px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  position: sticky;
  top:0;
  z-index:1000;
}
#menuBtn { font-size:1.8em; cursor:pointer; color:#00f0ff; }
#logo { font-size:1.8em; font-weight:bold; color:#fff; text-shadow:0 0 10px #00f0ff; }

/* === Sidebar Menu === */
#sidebar {
  position:fixed;
  left:-220px;
  top:0;
  width:220px;
  height:100%;
  background:#222;
  padding:25px;
  box-shadow:2px 0 12px rgba(0,0,0,0.5);
  transition:0.3s;
  z-index:999;
}
#sidebar.show { left:0; }
#sidebar a { display:block; color:#fff; margin:20px 0; font-weight:bold; }
#sidebar a:hover { color:#00f0ff; }

/* === Main Section === */
main {
  padding:50px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height: calc(100vh - 70px);
}
main h1 {
  font-size:2.5em;
  text-align:center;
  margin-bottom:20px;
  text-shadow:0 0 15px #00f0ff,0 0 25px #a020ff;
}

/* Badges */
.badges { display:flex; gap:10px; margin-bottom:30px; flex-wrap:wrap; }
.badge {
  background: rgba(255,255,255,0.1);
  padding:6px 12px;
  border-radius:12px;
  font-size:0.9em;
  border:1px solid rgba(255,255,255,0.3);
  text-shadow:0 0 5px #00f0ff;
}

/* Neon glow buttons */
button.glow-btn {
  padding:15px 35px;
  font-size:1.2em;
  font-weight:bold;
  border:none;
  border-radius:25px;
  background: linear-gradient(90deg,#00f0ff,#a020ff);
  color:#fff;
  cursor:pointer;
  box-shadow:0 0 10px #00f0ff,0 0 20px #a020ff;
  transition: all 0.3s ease;
}
button.glow-btn:hover {
  box-shadow:0 0 20px #00f0ff,0 0 40px #a020ff,0 0 60px #00f0ff;
  transform: translateY(-3px);
}

/* Dropdown */
select {
  margin-top:20px;
  padding:10px 15px;
  border-radius:12px;
  border:none;
  background: rgba(255,255,255,0.05);
  color:#fff;
  font-size:1em;
  box-shadow:0 0 5px #00f0ff;
  appearance:none;
  cursor:pointer;
}

/* Loading Animation */
#loading { display:none; text-align:center; font-weight:bold; margin:12px 0; }

/* Responsive */
@media(max-width:600px){
  main h1 { font-size:2em; }
  button.glow-btn { width:100%; padding:15px; }
  .badges { justify-content:center; }
}
</style>
</head>
<body>

<header>
  <div id="menuBtn">&#9776;</div>
  <div id="logo">LINKwave</div>
  <div style="width:30px;"></div>
</header>

<!-- Sidebar Menu -->
<div id="sidebar">
  <a href="contact.html" target="_blank">Contact</a>
  <a href="developer.html" target="_blank">Developer</a>
  <a href="terms.html" target="_blank">Terms & Service</a>
</div>

<main>
  <h1>Share and Submit Your Best Links!</h1>
  <div class="badges">
    <div class="badge">No Login Required</div>
    <div class="badge">Instant Approval</div>
    <div class="badge">100% Free</div>
  </div>

  <button class="glow-btn" id="submitBtn">+ Submit Link</button>
  <div id="loading">Loading...</div>

  <select>
    <option>Newest First</option>
    <option>Oldest First</option>
    <option>Most Popular</option>
  </select>
</main>

<script>
// Sidebar toggle
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
menuBtn.addEventListener('click', ()=> sidebar.classList.toggle('show'));

// Submit button → loading + new page
document.getElementById('submitBtn').addEventListener('click', ()=>{
  const loading = document.getElementById('loading');
  loading.style.display = 'block';
  setTimeout(()=>{
    window.location.href = 'submit.html';
  }, 800);
});
</script>

</body>
</html>
