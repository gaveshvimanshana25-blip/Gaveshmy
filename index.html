<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINKwave</title>
<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color:#fff;
  scroll-behavior: smooth;
}

header {
  display:flex;
  justify-content: space-between;
  align-items:center;
  padding:15px 20px;
  position: sticky;
  top:0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  z-index:1000;
}

#menuBtn { font-size:1.8em; cursor:pointer; color:#00f0ff; }
#logo { font-size:1.8em; font-weight:bold; text-shadow:0 0 10px #00f0ff; }

#menuDropdown {
  display:none;
  position:absolute;
  top:60px;
  left:20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  padding:10px;
}

#menuDropdown a {
  display:block;
  padding:8px 15px;
  color:#fff;
  text-decoration:none;
}

#menuDropdown a:hover {
  background: rgba(0,255,255,0.2);
  border-radius:8px;
}

main { padding:50px 20px; display:flex; flex-direction:column; align-items:center; }

main h1 { font-size:2.5em; text-align:center; margin-bottom:30px; text-shadow:0 0 15px #00f0ff,0 0 25px #a020ff; }

.badges-container { display:flex; flex-wrap:wrap; justify-content:center; gap:15px; margin-bottom:30px; }

.badge-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius:15px; border:1px solid rgba(255,255,255,0.2); padding:15px; display:flex; flex-direction:column; align-items:center; width:160px; text-align:center; }

.badge { margin-bottom:10px; font-size:1em; text-shadow:0 0 5px #00f0ff; }

button.glow-btn { padding:15px 35px; font-size:1.2em; font-weight:bold; border:none; border-radius:25px; background: linear-gradient(90deg,#00f0ff,#a020ff); color:#fff; cursor:pointer; box-shadow:0 0 10px #00f0ff,0 0 20px #a020ff; transition: all 0.3s ease; }

button.glow-btn:hover { box-shadow:0 0 20px #00f0ff,0 0 40px #a020ff,0 0 60px #00f0ff; transform: translateY(-3px); }

button.join-btn { padding:8px 20px; font-size:0.9em; margin-top:5px; }

select { margin-top:20px; padding:10px 15px; border-radius:12px; border:none; background: rgba(255,255,255,0.05); color:#fff; font-size:1em; cursor:pointer; }

section { width:100%; min-height:100vh; display:flex; justify-content:center; align-items:center; font-size:2em; text-shadow:0 0 10px #00f0ff; }

@media(max-width:600px){
  main h1 { font-size:2em; }
  .badge-box { width:120px; }
  button.glow-btn { width:100%; padding:15px; }
}
</style>
</head>
<body>

<header>
  <div id="menuBtn">&#9776;</div>
  <div id="logo">LINKwave</div>
  <div id="menuDropdown">
    <a href="#contact">Contact</a>
    <a href="#privacy">Privacy Policy</a>
    <a href="#about">About</a>
  </div>
</header>

<main>
  <h1>Submit and Share Your Best Links Effortlessly!</h1>

  <div class="badges-container">
    <div class="badge-box">
      <div class="badge">No Login Required</div>
      <button class="glow-btn join-btn">Join Now</button>
    </div>
    <div class="badge-box">
      <div class="badge">Instant Approval</div>
      <button class="glow-btn join-btn">Join Now</button>
    </div>
    <div class="badge-box">
      <div class="badge">100% Free</div>
      <button class="glow-btn join-btn">Join Now</button>
    </div>
  </div>

  <button class="glow-btn">+ Submit Link</button>

  <select>
    <option>Newest First</option>
    <option>Oldest First</option>
    <option>Most Popular</option>
  </select>
</main>

<section id="contact">Contact Section</section>
<section id="privacy">Privacy Policy Section</section>
<section id="about">About Section</section>

<script>
const menuBtn = document.getElementById('menuBtn');
const menuDropdown = document.getElementById('menuDropdown');
const menuLinks = document.querySelectorAll('#menuDropdown a');

menuBtn.addEventListener('click', () => {
  menuDropdown.style.display = menuDropdown.style.display === 'block' ? 'none' : 'block';
});

window.addEventListener('click', (e) => {
  if(!menuDropdown.contains(e.target) && e.target !== menuBtn){
    menuDropdown.style.display = 'none';
  }
});

// Smooth scroll
menuLinks.forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    const target = document.querySelector(link.getAttribute('href'));
    target.scrollIntoView({behavior:'smooth'});
    menuDropdown.style.display='none';
  });
});

// Submit button redirect
const submitBtn = document.querySelector('button.glow-btn:not(.join-btn)');
submitBtn.addEventListener('click', () => {
  window.location.href='submit.html'; // change to your submit page
});
</script>

</body>
</html>
