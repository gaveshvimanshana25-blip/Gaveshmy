<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
}

/* Header */
header {
  padding: 20px;
  text-align: center;
  font-size: 2.5rem;
  font-weight: bold;
  background: linear-gradient(90deg, #0ff, #f0f, #ff0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Layout */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* Categories on left */
.categories {
  width: 150px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}
.categories button {
  padding: 12px;
  border: 1px solid #0ff;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  color: #0ff;
  cursor: pointer;
  transition: 0.3s;
}
.categories button:hover {
  background: #0ff;
  color: #111;
}

/* Links section */
.links {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 15px;
  max-height: 500px; /* scrollable */
  overflow-y: auto;
  padding-right: 10px;
}
.link-btn {
  padding: 15px;
  border: 1px solid #0ff;
  border-radius: 10px;
  color: #0ff;
  text-decoration: none;
  background: rgba(255,255,255,0.05);
  transition: 0.3s;
}
.link-btn:hover {
  background: #0ff;
  color: #111;
}

/* Scrollbar style */
.links::-webkit-scrollbar {
  width: 6px;
}
.links::-webkit-scrollbar-thumb {
  background: #0ff;
  border-radius: 3px;
}

/* Responsive */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }
  .categories {
    flex-direction: row;
    overflow-x: auto;
    width: 100%;
  }
  .categories button {
    flex: 0 0 auto;
  }
}
</style>
</head>
<body>

<header>LinkWave</header>

<div class="container">
  <div class="categories">
    <button onclick="showLinks('whatsapp')">WhatsApp</button>
    <button onclick="showLinks('telegram')">Telegram</button>
    <button onclick="showLinks('other')">Other</button>
  </div>

  <div class="links" id="linksContainer">
    <!-- Links will appear here -->
    <a class="link-btn" href="https://example.com" target="_blank">Example Link 1</a>
    <a class="link-btn" href="https://example2.com" target="_blank">Example Link 2</a>
    <a class="link-btn" href="https://example3.com" target="_blank">Example Link 3</a>
  </div>
</div>

<script>
// Example dynamic filter by category
const allLinks = [
  {title: "WhatsApp Group 1", url: "https://wa.me/123", category: "whatsapp"},
  {title: "Telegram Channel 1", url: "https://t.me/example", category: "telegram"},
  {title: "Other Link", url: "https://example.com", category: "other"},
  {title: "WhatsApp Group 2", url: "https://wa.me/456", category: "whatsapp"},
  {title: "Telegram Channel 2", url: "https://t.me/example2", category: "telegram"},
];

function showLinks(cat) {
  const container = document.getElementById('linksContainer');
  container.innerHTML = '';
  allLinks
    .filter(link => link.category === cat)
    .forEach(link => {
      const a = document.createElement('a');
      a.className = 'link-btn';
      a.href = link.url;
      a.target = '_blank';
      a.textContent = link.title;
      container.appendChild(a);
    });
}
</script>

</body>
</html>
