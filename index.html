<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINKwave</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
  body { background: linear-gradient(135deg, #0f0f0f, #1a1a1a); color:#fff; min-height:100vh; }

  /* Header */
  header {
    display:flex; justify-content:space-between; align-items:center;
    padding:15px 20px; background: rgba(0,0,0,0.5); backdrop-filter:blur(10px);
    position: relative;
  }
  .logo { font-size:1.5rem; font-weight:bold; color:#ff4d4d; }
  .menu-toggle { font-size:1.5rem; cursor:pointer; display:block; }

  /* Navigation Menu */
  nav {
    position:absolute; top:60px; right:20px; background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.2); border-radius:10px; padding:10px 20px;
    display:none; flex-direction:column; gap:10px; min-width:150px;
  }
  nav a { color:#fff; text-decoration:none; transition:0.2s; }
  nav a:hover { color:#ff4d4d; }
  nav.active { display:flex; }

  /* Main Content */
  main { text-align:center; padding:50px 20px; }
  h1 { font-size:2rem; margin-bottom:15px; }

  .features { display:flex; justify-content:center; gap:20px; margin-top:30px; flex-wrap:wrap; }
  .feature { background: rgba(255,255,255,0.05); padding:10px 20px; border-radius:10px; backdrop-filter:blur(10px); }

  /* Footer */
  footer { text-align:center; margin-top:50px; font-size:0.9rem; color:#aaa; }
</style>
</head>
<body>

<header>
  <div class="logo">LINKwave</div>
  <div class="menu-toggle" id="menuToggle">☰</div>
  <nav id="navMenu">
    <a href="index.html">Home</a>
    <a href="submit.html">Submit Link</a>
    <a href="popular.html">Popular</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <h1>Submit and Share Your Best Links Effortlessly!</h1>
  <div class="features">
    <div class="feature">No Login Required</div>
    <div class="feature">Instant Approval</div>
    <div class="feature">100% Free</div>
  </div>
</main>

<footer>
  &copy; 2026 LINKwave. All rights reserved.
</footer>

<script>
  const menuToggle = document.getElementById('menuToggle');
  const navMenu = document.getElementById('navMenu');

  menuToggle.addEventListener('click', () => {
    navMenu.classList.toggle('active');
  });
</script>

</body>
</html>
