<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave</title>

<style>
/* -------------------- GENERAL -------------------- */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#000000,#0a0a0f);
  color:white;
  text-align:center;
}

/* -------------------- HEADER -------------------- */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  font-size:28px;
  font-weight:bold;
  position:relative;
}

.menu-icon{
  font-size:28px;
  cursor:pointer;
}

/* Dropdown menu */
.dropdown{
  display:none;
  position:absolute;
  top:70px;
  left:20px;
  background:rgba(0,0,0,0.9);
  border:1px solid #333;
  border-radius:10px;
  padding:10px 0;
  min-width:180px;
  text-align:left;
  z-index:100;
}

.dropdown a{
  display:block;
  color:white;
  padding:10px 20px;
  text-decoration:none;
}

.dropdown a:hover{
  background:rgba(58,127,253,0.2);
}

/* -------------------- TITLE -------------------- */
h1{font-size:40px;margin-top:20px;}
p{color:#aaa;max-width:600px;margin:auto;}

/* -------------------- BUTTON -------------------- */
.main-btn{
  display:inline-block;
  margin-top:25px;
  padding:14px 28px;
  border-radius:30px;
  background:linear-gradient(45deg,#3a7bfd,#a855f7);
  color:white;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 0 20px rgba(120,80,255,0.7);
}

/* -------------------- SEARCH -------------------- */
.search{margin-top:40px;}
.search input{padding:12px;width:220px;border-radius:10px;border:none;}
.search select{padding:12px;border-radius:10px;border:none;}

/* -------------------- CARDS -------------------- */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:40px;
  gap:20px;
}

.card{
  width:220px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
}

.join{
  display:inline-block;
  margin-top:10px;
  padding:8px 16px;
  border-radius:20px;
  background:linear-gradient(45deg,#3a7bfd,#a855f7);
  text-decoration:none;
  color:white;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <div>LinkWave</div>
  <div></div> <!-- empty for balance -->

  <!-- Dropdown menu -->
  <div class="dropdown" id="dropdownMenu">
    <a href="contact.html" target="_blank">Contact</a>
    <a href="terms.html" target="_blank">Terms & Policy</a>
    <a href="developer.html" target="_blank">Developer</a>
  </div>
</header>

<h1>Discover and Join the Best Communities</h1>
<p>Find WhatsApp, Telegram and social groups shared by the community.</p>

<a class="main-btn" href="submit.html" target="_blank">+ Submit Your Link</a>

<div class="search">
  <input type="text" id="searchInput" placeholder="Search groups...">
  <select id="filterSelect">
    <option value="Newest">Newest First</option>
    <option value="Popular">Popular</option>
    <option value="WhatsApp">WhatsApp</option>
    <option value="Telegram">Telegram</option>
  </select>
</div>

<div class="cards" id="cardsContainer">
  <!-- Dynamic cards from submitted links will appear here -->
</div>

<script>
// Toggle menu
function toggleMenu(){
  const menu = document.getElementById('dropdownMenu');
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}
window.onclick = function(e){
  const menu = document.getElementById('dropdownMenu');
  if(!e.target.matches('.menu-icon')){
    if(menu.style.display === "block"){ menu.style.display = "none"; }
  }
}

// Load submitted links from localStorage
function loadLinks(){
  const container = document.getElementById('cardsContainer');
  container.innerHTML = "";
  let links = JSON.parse(localStorage.getItem('linkwaveLinks')) || [];
  
  // Reverse for newest first
  links.reverse().forEach(link => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${link.name}</h3>
                      <p>${link.description}</p>
                      <a class="join" href="${link.url}" target="_blank">Join</a>`;
    container.appendChild(card);
  });
}

// Call loadLinks on page load
window.onload = loadLinks;

// Optional: live search/filter
document.getElementById('searchInput').addEventListener('input', function(){
  const term = this.value.toLowerCase();
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    const text = card.querySelector('h3').textContent.toLowerCase();
    card.style.display = text.includes(term) ? 'block' : 'none';
  });
});
</script>

</body>
</html>
