<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LinkWave</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#050508,#000);
color:white;
text-align:center;
overflow-x:hidden;
}

/* HEADER */

header{
position:sticky;
top:0;
background:rgba(0,0,0,0.9);
padding:18px;
z-index:100;
}

.menu{
position:absolute;
left:20px;
top:22px;
font-size:28px;
cursor:pointer;
}

.logo{
width:70px;
border-radius:50%;
box-shadow:0 0 20px #3a7bfd;
}

.title{
font-size:32px;
font-weight:bold;
margin-top:5px;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
-webkit-background-clip:text;
color:transparent;
}

/* MENU */

.dropdown{
display:none;
position:absolute;
left:15px;
top:65px;
background:#000;
border-radius:10px;
overflow:hidden;
}

.dropdown a{
display:block;
padding:12px 20px;
text-decoration:none;
color:white;
}

.dropdown a:hover{
background:#222;
}

/* HERO */

.hero{
margin-top:30px;
}

.hero h1{
font-size:30px;
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 26px;
border-radius:30px;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
text-decoration:none;
color:white;
font-weight:bold;
}

/* SEARCH */

.search{
margin-top:20px;
}

.search input{
width:230px;
padding:10px;
border-radius:10px;
border:none;
}

/* CATEGORY */

#categoryScroll{
display:flex;
gap:10px;
justify-content:center;
margin-top:20px;
overflow-x:auto;
padding:10px;
}

#categoryScroll div{
background:#222;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
}

#subCategoryScroll{
display:flex;
gap:8px;
justify-content:center;
margin-top:10px;
overflow-x:auto;
padding:5px;
}

#subCategoryScroll div{
background:#333;
padding:6px 16px;
border-radius:20px;
cursor:pointer;
}

/* CARDS */

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:16px;
margin-top:25px;
}

.card{
width:200px;
background:#111;
border-radius:15px;
padding:15px;
border:1px solid #333;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px #3a7bfd55;
}

.card img{
width:100%;
border-radius:10px;
}

.join{
display:inline-block;
margin-top:6px;
padding:6px 14px;
border-radius:20px;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
text-decoration:none;
color:white;
}

/* PAGINATION */

#pagination{
margin-top:30px;
}

.page{
padding:7px 14px;
margin:4px;
border:none;
border-radius:8px;
background:#222;
color:white;
cursor:pointer;
}

.page.active{
background:#3a7bfd;
}

/* FOOTER */

footer{
margin-top:40px;
padding:20px;
background:#000;
color:#aaa;
}

/* SNOW */

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.flake{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<header>

<div class="menu" onclick="toggleMenu()">☰</div>

<img class="logo" src="https://raw.githubusercontent.com/gaveshvimanshana25-blip/Gaveshmy/refs/heads/main/file_00000000fc0c72088645a465db760c82.png">

<div class="title">LinkWave</div>

<div class="dropdown" id="menu">

<a href="#">Home</a>
<a href="submit.html">Submit Link</a>
<a href="#">Developer</a>
<a href="#">Contact</a>

</div>

</header>

<div class="hero">

<h1>Discover Communities</h1>
<p>Find WhatsApp • Telegram • Facebook groups</p>

<a class="btn" href="submit.html">+ Submit Link</a>

</div>

<div class="search">

<input id="search" placeholder="Search groups...">

</div>

<div id="categoryScroll">

<div data-platform="All">All</div>
<div data-platform="WhatsApp">WhatsApp</div>
<div data-platform="Telegram">Telegram</div>
<div data-platform="Facebook">Facebook</div>
<div data-platform="Viber">Viber</div>

</div>

<div id="subCategoryScroll"></div>

<div class="cards" id="cards"></div>

<div id="pagination"></div>

<footer>

Made in Sri Lanka 🇱🇰 <br>
© 2026 LinkWave

</footer>

<div id="snow"></div>

<script>

/* MENU */

function toggleMenu(){

let m=document.getElementById("menu")

m.style.display=m.style.display==="block"?"none":"block"

}

/* SNOW */

function snow(count){

let c=document.getElementById("snow")

for(let i=0;i<count;i++){

let f=document.createElement("div")

f.className="flake"

f.style.left=Math.random()*100+"vw"

f.style.animationDuration=(3+Math.random()*5)+"s"

c.appendChild(f)

}

}

snow(50)

/* DATA */

let links=[]
let platform="All"
let category="All"
let page=1
const perPage=12

/* FETCH GITHUB JSON */

async function loadLinks(){

let r=await fetch("https://github.com/gaveshvimanshana25-blip/Gaveshmy/blob/main/links.json")

links=await r.json()

showLinks()

}

/* SHOW LINKS */

function showLinks(){

let box=document.getElementById("cards")

box.innerHTML=""

let filtered=links.filter(l=>

(platform==="All"||l.platform===platform)&&
(category==="All"||l.category===category)

)

let start=(page-1)*perPage

let show=filtered.slice(start,start+perPage)

show.forEach(l=>{

let d=document.createElement("div")

d.className="card"

d.innerHTML=`
${l.logo?`<img src="${l.logo}">`:``}
<h3>${l.name}</h3>
<p>${l.description}</p>
<a class="join" target="_blank" href="${l.url}">Join</a>
`

box.appendChild(d)

})

pagination(filtered.length)

}

/* PAGINATION */

function pagination(total){

let p=document.getElementById("pagination")

p.innerHTML=""

let pages=Math.ceil(total/perPage)

for(let i=1;i<=pages;i++){

let b=document.createElement("button")

b.innerText=i

b.className="page"

if(i===page)b.classList.add("active")

b.onclick=()=>{

page=i

showLinks()

}

p.appendChild(b)

}

}

/* CATEGORY */

document.querySelectorAll("#categoryScroll div").forEach(b=>{

b.onclick=function(){

platform=this.dataset.platform

page=1

showLinks()

}

})

/* SEARCH */

document.getElementById("search").addEventListener("input",function(){

let v=this.value.toLowerCase()

document.querySelectorAll(".card").forEach(c=>{

let t=c.querySelector("h3").textContent.toLowerCase()

c.style.display=t.includes(v)?"block":"none"

})

})

/* START */

loadLinks()

</script>

</body>
                                   </html>
