<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave</title>

<style>

/* Body */

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(180deg,#050508,#000);
overflow-x:hidden;
}

/* Floating background */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#3a7bfd22,#000 70%);
animation:bgMove 20s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{transform:translate(0,0)}
50%{transform:translate(-20%, -20%)}
100%{transform:translate(0,0)}
}

/* HEADER */

header{
position:sticky;
top:0;
padding:15px;
background:rgba(0,0,0,0.9);
z-index:100;
}

/* menu */

.menu-icon{
position:absolute;
left:20px;
top:20px;
font-size:28px;
cursor:pointer;
}

/* logo area */

.logo-box{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* logo */

.logo{
width:70px;
height:70px;
border-radius:50%;
animation:logoPulse 4s infinite;
transition:0.4s;
}

/* rotate hover */

.logo:hover{
transform:rotate(360deg) scale(1.1);
}

/* glow animation */

@keyframes logoPulse{

0%{
box-shadow:0 0 10px #3a7bfd;
transform:scale(1);
}

50%{
box-shadow:0 0 30px #a855f7;
transform:scale(1.1);
}

100%{
box-shadow:0 0 10px #3a7bfd;
transform:scale(1);
}

}

/* title */

.title{
font-size:32px;
font-weight:bold;
margin-top:8px;

background:linear-gradient(45deg,#3a7bfd,#a855f7);
-webkit-background-clip:text;
color:transparent;

animation:titleWave 3s infinite;
}

@keyframes titleWave{

0%{letter-spacing:1px}

50%{letter-spacing:6px}

100%{letter-spacing:1px}

}

/* dropdown */

.dropdown{
display:none;
position:absolute;
top:60px;
left:15px;
background:rgba(0,0,0,0.95);
border:1px solid #333;
border-radius:10px;
padding:10px 0;
min-width:180px;
text-align:left;
}

.dropdown a{
display:block;
color:white;
padding:10px 20px;
text-decoration:none;
}

.dropdown a:hover{
background:rgba(58,127,253,0.2);
}

/* hero */

.hero{
margin-top:20px;
opacity:0;
transform:translateY(20px);
animation:fadeUp 1s forwards;
}

.hero p{
color:#aaa;
max-width:600px;
margin:auto;
}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

/* button */

.main-btn{
display:inline-block;
margin-top:20px;
padding:12px 28px;
border-radius:30px;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
color:white;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 20px #3a7bfd;
transition:0.3s;
}

.main-btn:hover{
transform:scale(1.05);
box-shadow:0 0 35px #a855f7;
}

/* search */

.search{
margin-top:20px;
}

.search input{
padding:10px;
width:220px;
border-radius:10px;
border:none;
}

/* category */

#categoryScroll{
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
overflow-x:auto;
padding:10px;
}

#categoryScroll div{
padding:8px 18px;
background:rgba(58,127,253,0.2);
border-radius:20px;
cursor:pointer;
white-space:nowrap;
transition:0.3s;
}

#categoryScroll div:hover{
background:linear-gradient(45deg,#3a7bfd,#a855f7);
transform:scale(1.1);
}

/* subcategory */

#subCategoryScroll{
margin-top:10px;
display:flex;
justify-content:center;
gap:8px;
overflow-x:auto;
padding:5px;
}

#subCategoryScroll div{
padding:6px 16px;
background:rgba(168,85,247,0.2);
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

#subCategoryScroll div:hover{
background:linear-gradient(45deg,#a855f7,#3a7bfd);
}

/* cards */

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:20px;
}

.card{
width:200px;
padding:15px;
border-radius:15px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 10px 20px rgba(58,127,253,0.5);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:5px;
}

.join{
display:inline-block;
margin-top:5px;
padding:6px 14px;
border-radius:20px;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
color:white;
text-decoration:none;
font-size:14px;
}

/* footer */

footer{
margin-top:30px;
padding:20px;
background:#000;
color:#aaa;
}

/* snow */

#snowContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.snowflake{
position:absolute;
top:-10px;
width:5px;
height:5px;
background:white;
border-radius:50%;
opacity:0.8;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<header>

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="logo-box">

<img class="logo" src="https://raw.githubusercontent.com/gaveshvimanshana25-blip/Gaveshmy/refs/heads/main/file_00000000fc0c72088645a465db760c82.png">

<div class="title">LinkWave</div>

</div>

<div class="dropdown" id="dropdownMenu">
<a href="index.html">Home</a>
<a href="submit.html">Submit Link</a>
<a href="analytics.html">Live Analytics</a>
<a href="developer.html">Developer</a>
<a href="contact.html">Contact</a>
</div>

</header>

<div class="hero">
<h1>Discover and Join Communities</h1>
<p>Find WhatsApp, Telegram, Facebook groups shared by the community.</p>
<a class="main-btn" href="submit.html">+ Submit Link</a>
</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Search groups...">
</div>

<div id="categoryScroll">
<div data-platform="All">All</div>
<div data-platform="WhatsApp">WhatsApp</div>
<div data-platform="Telegram">Telegram</div>
<div data-platform="Facebook">Facebook</div>
</div>

<div id="subCategoryScroll"></div>
<div class="cards" id="cardsContainer"></div>

<footer>
Made in Sri Lanka 🇱🇰 <br>
© 2026 LinkWave
</footer>

<div id="snowContainer"></div>

<script>

/* menu */

function toggleMenu(){
const menu=document.getElementById("dropdownMenu")
menu.style.display=(menu.style.display==="block")?"none":"block"
}

/* snow */

function createSnowflakes(count){
const container=document.getElementById("snowContainer")

for(let i=0;i<count;i++){

const flake=document.createElement("div")

flake.className="snowflake"

flake.style.left=Math.random()*100+"vw"

flake.style.animationDuration=(3+Math.random()*5)+"s"

container.appendChild(flake)

flake.addEventListener("animationend",()=>{
flake.remove()
createSnowflakes(1)
})

}

}

createSnowflakes(50)

</script>

</body>
</html>
