<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINKGIC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
}
/* Header */
header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
}
header .logo {
  font-size: 2rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #fff;
  text-shadow: 0 0 8px #00f0ff, 0 0 12px #ff00ff;
}
header .hamburger {
  font-size: 2rem;
  cursor: pointer;
  color: #fff;
  position: relative;
}
/* Dropdown Menu */
.menu {
  position: absolute;
  top: 60px;
  left: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  display: none;
  flex-direction: column;
  width: 150px;
  padding: 10px 0;
  z-index: 1000;
}
.menu a {
  color: #fff;
  text-decoration: none;
  padding: 10px 20px;
  display: block;
  transition: 0.2s;
}
.menu a:hover {
  background: rgba(255,255,255,0.1);
}
/* Top Badge */
.top-badge {
  margin: 20px 0;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.05);
  padding: 6px 12px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  font-size: 0.9rem;
}
.top-badge .online-dot {
  width: 10px;
  height: 10px;
  background: #00ff00;
  border-radius: 50%;
}
/* Main Section */
.main-section {
  text-align: center;
  padding: 60px 20px;
}
.main-section h1 {
  font-size: 2rem;
  margin-bottom: 20px;
  line-height: 1.4;
}
.badges {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 30px;
}
.badges span {
  padding: 6px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  font-size: 0.85rem;
  color: #fff;
}
/* Buttons */
.main-btn {
  display: inline-block;
  padding: 15px 40px;
  font-size: 1.1rem;
  font-weight: 700;
  border-radius: 30px;
  background: linear-gradient(90deg, #00f0ff, #ff00ff);
  color: #fff;
  text-decoration: none;
  box-shadow: 0 0 10px #00f0ff, 0 0 20px #ff00ff;
  margin: 10px;
  transition: 0.3s;
}
.main-btn:hover {
  box-shadow: 0 0 20px #00f0ff, 0 0 30px #ff00ff;
  transform: scale(1.05);
}
/* Responsive */
@media (min-width: 768px) {
  .main-section h1 { font-size: 2.5rem; }
  .main-btn { font-size: 1.3rem; }
}
</style>
</head>
<body>

<header>
  <div class="hamburger">&#9776;
    <div class="menu">
      <a href="contact.html" target="_blank">Contact</a>
      <a href="developer.html" target="_blank">Developer</a>
      <a href="terms.html" target="_blank">Terms</a>
      <a href="policy.html" target="_blank">Policy</a>
    </div>
  </div>
  <div class="logo">LINKGIC</div>
  <div></div>
</header>

<div class="top-badge">
  <div class="online-dot"></div>
  Active Links: 531
</div>

<div class="main-section">
  <h1>The ultimate open directory for social groups.<br>Discover thousands of active WhatsApp, Telegram, and social communities.</h1>
  <div class="badges">
    <span>No Login Required</span>
    <span>Instant Approval</span>
    <span>100% Free</span>
  </div>
  <a href="submit.html" target="_blank" class="main-btn">+ Submit Link</a>
  <a href="join.html" target="_blank" class="main-btn">Join Now</a>
</div>

<script>
// Hamburger menu toggle
const hamburger = document.querySelector('.hamburger');
const menu = document.querySelector('.menu');
hamburger.addEventListener('click', () => {
  menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
});
</script>

</body>
</html>
