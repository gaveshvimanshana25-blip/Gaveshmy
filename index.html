<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Link Hub</title>
<style>
  body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }
  header { text-align:center; padding:20px; font-size:2em; animation: slideDown 1s; background:#333; color:#fff; }
  @keyframes slideDown { 0% { transform: translateY(-50px); opacity:0; } 100% { transform: translateY(0); opacity:1; } }

  #menuBtn { position:fixed; left:10px; top:10px; font-size:2em; cursor:pointer; color:#333; z-index:1000; }
  nav { position:fixed; left:-200px; top:0; width:200px; height:100%; background:#444; color:#fff; padding:20px; transition:0.3s; z-index:999; }
  nav.show { left:0; }
  nav a { display:block; color:#fff; text-decoration:none; margin:15px 0; font-weight:bold; }

  main { padding:20px; margin-left:0; transition:0.3s; }
  .form-box { background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); margin-bottom:20px; }
  input, textarea, select, button { width:100%; padding:10px; margin:5px 0; border-radius:5px; border:1px solid #ccc; }
  button { background:#333; color:#fff; cursor:pointer; }
  button:hover { background:#555; }

  #loading { display:none; text-align:center; font-weight:bold; margin:10px 0; }

  #group-container { display:grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap:15px; }
  .group-box { background:#fff; padding:15px; border-radius:10px; box-shadow:0 0 8px rgba(0,0,0,0.1); position:relative; text-align:center; }
  .group-box img { width:50px; height:50px; object-fit:cover; border-radius:50%; margin-bottom:10px; }
  .group-box button { width:100%; margin-top:10px; }
</style>
</head>
<body>

<div id="menuBtn">&#9776;</div>
<nav id="sidebar">
  <a href="#">Contact</a>
  <a href="#">Developer</a>
  <a href="#">Terms & Service</a>
</nav>

<header>Group Link Hub</header>

<main>
  <div class="form-box">
    <h3>Submit Group</h3>
    <input type="text" id="title" placeholder="Title">
    <textarea id="description" placeholder="Description"></textarea>
    <input type="text" id="link" placeholder="Group Link">
    <select id="category">
      <option value="">Select Category</option>
      <option value="Movie">Movie</option>
      <option value="Funny">Funny</option>
      <option value="Chat">Chat</option>
    </select>
    <select id="platform">
      <option value="">Select Platform</option>
      <option value="WhatsApp">WhatsApp</option>
      <option value="Telegram">Telegram</option>
    </select>
    <button onclick="submitGroup()">Submit</button>
    <div id="loading">Loading...</div>
  </div>

  <div id="group-container"></div>
</main>

<script>
let groups = [];

const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
menuBtn.addEventListener('click', () => sidebar.classList.toggle('show'));

function getPlatformLogo(platform){
  if(platform === 'WhatsApp') return 'https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg';
  if(platform === 'Telegram') return 'https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg';
  return '';
}

function submitGroup(){
  const title = document.getElementById('title').value.trim();
  const description = document.getElementById('description').value.trim();
  const link = document.getElementById('link').value.trim();
  const category = document.getElementById('category').value;
  const platform = document.getElementById('platform').value;

  if(!title || !link || !category || !platform){ 
    alert("Please fill all fields!"); 
    return; 
  }

  document.getElementById('loading').style.display = 'block';

  setTimeout(() => {
    const group = { title, description, link, category, platform, image: getPlatformLogo(platform) };
    groups.push(group);
    displayGroups();
    document.getElementById('loading').style.display = 'none';

    document.getElementById('title').value='';
    document.getElementById('description').value='';
    document.getElementById('link').value='';
    document.getElementById('category').value='';
    document.getElementById('platform').value='';
  }, 800);
}

function displayGroups(){
  const container = document.getElementById('group-container');
  container.innerHTML = '';
  groups.forEach(g => {
    container.innerHTML += `
      <div class="group-box">
        <img src="${g.image}" alt="${g.platform} logo"/>
        <h4>${g.title}</h4>
        <p>${g.description}</p>
        <p><b>Category:</b> ${g.category}</p>
        <a href="${g.link}" target="_blank"><button>Join</button></a>
      </div>
    `;
  });
}
</script>

</body>
</html>
