<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0a0a0a,#111);
  color:white;
}

/* Header */
header{
  display:flex; justify-content:space-between; align-items:center;
  padding:15px 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 15px rgba(0,255,255,0.2);
}
.logo{font-size:28px; font-weight:bold; color:#0ff; text-shadow:0 0 10px #0ff;}
.menu-icon{font-size:28px; cursor:pointer;}

/* Hero */
.hero{text-align:center; padding:40px 20px;}
.hero h1{font-size:32px; margin-bottom:10px; color:#0ff;}
.hero p{font-size:18px; max-width:600px; margin:0 auto 20px auto; color:#ccc;}

/* Submit Button */
.main-btn{
  padding:12px 30px; font-size:18px; font-weight:bold;
  color:white; border:none; border-radius:25px;
  cursor:pointer; background: linear-gradient(90deg,#00f,#a0f);
  box-shadow:0 0 20px #00f,0 0 40px #a0f;
  transition:0.3s;
}
.main-btn:hover{box-shadow:0 0 30px #0ff,0 0 60px #f0f; transform:scale(1.05);}

/* Overlay + Form */
#submitForm{
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:999;
}
.form-container{
  background: rgba(255,255,255,0.05); backdrop-filter:blur(12px); padding:30px;
  border-radius:25px; max-width:400px; width:90%; text-align:center; box-shadow:0 0 25px #0ff;
}
input,textarea,select{width:90%; padding:10px; margin:10px 0; border-radius:10px; border:none; background: rgba(255,255,255,0.1); color:white;}
textarea{height:60px;}
button.submit-btn{padding:10px 25px; border:none; border-radius:25px; cursor:pointer; background: linear-gradient(90deg,#00f,#a0f); color:white; font-weight:bold; margin-top:10px; transition:0.3s;}
button.submit-btn:hover{box-shadow:0 0 30px #0ff,0 0 60px #f0f; transform:scale(1.05);}

/* Close button */
.close-btn{position:absolute; top:15px; right:20px; font-size:28px; cursor:pointer; color:#0ff;}

/* Cards */
.cards-container{display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin:30px 0;}
.card{
  background: rgba(0,0,0,0.5); backdrop-filter:blur(10px); padding:15px;
  border-radius:15px; box-shadow:0 0 15px #0ff; width:250px; position:relative;
  text-align:left;
}
.card img{width:40px; height:40px; border-radius:50%; margin-right:10px; vertical-align:middle;}
.card h3{margin:5px 0; color:#0ff;}
.card p{margin:5px 0; color:#ccc;}
.card a{color:#0ff; text-decoration:none; font-weight:bold;}
.card .platform-badge{position:absolute; top:10px; right:10px; background:#00f; padding:5px 10px; border-radius:12px; font-size:12px; font-weight:bold; text-shadow:0 0 5px #0ff;}
</style>
</head>
<body>

<header>
<div class="logo">LinkWave</div>
<div class="menu-icon">☰</div>
</header>

<section class="hero">
<h1>Discover active social groups</h1>
<p>Submit your group links and explore thousands of WhatsApp and Telegram communities.</p>
<button class="main-btn" onclick="showForm()">+ Submit Link</button>
</section>

<!-- Submit Form Overlay -->
<div id="submitForm">
  <div class="form-container">
    <span class="close-btn" onclick="closeForm()">×</span>
    <h2>Submit Your Link</h2>
    <input type="text" id="title" placeholder="Group / Channel Title">
    <textarea id="description" placeholder="Description"></textarea>
    <input type="url" id="link" placeholder="Link (https://...)">
    <select id="platform">
      <option value="WhatsApp">WhatsApp</option>
      <option value="Telegram">Telegram</option>
    </select>
    <button class="submit-btn" onclick="submitData()">Submit</button>
  </div>
</div>

<!-- Cards Container -->
<div class="cards-container" id="cardsContainer">
<!-- Dynamic cards will appear here -->
</div>

<script>
// Show / Close form
function showForm(){ document.getElementById("submitForm").style.display="flex"; }
function closeForm(){ document.getElementById("submitForm").style.display="none"; }

// Platform logos
const platformLogos = {
  "WhatsApp": "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg",
  "Telegram": "https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg"
};

// Submit data
function submitData(){
  let title = document.getElementById("title").value;
  let desc = document.getElementById("description").value;
  let link = document.getElementById("link").value;
  let platform = document.getElementById("platform").value;

  if(!title || !link){ alert("Title and Link are required!"); return; }

  // Auto assign logo
  let logo = platformLogos[platform] || "https://via.placeholder.com/40";

  // Add card dynamically
  let cardHTML = `
  <div class="card">
    <span class="platform-badge">${platform}</span>
    <img src="${logo}" alt="logo"><h3>${title}</h3>
    <p>${desc}</p>
    <a href="${link}" target="_blank">Join Link</a>
  </div>`;
  
  document.getElementById("cardsContainer").insertAdjacentHTML("afterbegin", cardHTML);

  // Clear form
  document.getElementById("title").value="";
  document.getElementById("description").value="";
  document.getElementById("link").value="";
  document.getElementById("platform").value="WhatsApp";

  closeForm();
}
</script>

</body>
</html>
