<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Link Hub</title>
<style>
  body { font-family: Arial; margin:0; padding:0; background:#f4f4f4; }
  header { text-align:center; padding:25px; font-size:2em; color:#fff; background:#007BFF; animation: slideFade 1s; }
  @keyframes slideFade { 0% { transform: translateY(-50px); opacity:0; } 100% { transform: translateY(0); opacity:1; } }
  main { padding:20px; }
  .form-box { background:#fff; padding:20px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.1); margin-bottom:20px; }
  input, textarea, select, button { width:100%; padding:12px; margin:8px 0; border-radius:6px; border:1px solid #ccc; font-size:1em; }
  button { background:#007BFF; color:#fff; cursor:pointer; font-weight:bold; }
  button:hover { background:#0056b3; }
  #loading { display:none; text-align:center; font-weight:bold; margin:12px 0; }
</style>
</head>
<body>

<header>Group Link Hub</header>

<main>
  <div class="form-box">
    <h3>Submit Group</h3>
    <input type="text" id="title" placeholder="Title">
    <textarea id="description" placeholder="Description"></textarea>
    <input type="text" id="link" placeholder="Group Link">
    <select id="category">
      <option value="">Select Category</option>
      <option value="Movie">Movie</option>
      <option value="Funny">Funny</option>
      <option value="Chat">Chat</option>
    </select>
    <select id="platform">
      <option value="">Select Platform</option>
      <option value="WhatsApp">WhatsApp</option>
      <option value="Telegram">Telegram</option>
    </select>
    <button onclick="submitGroup()">Submit</button>
    <div id="loading">Loading...</div>
  </div>
</main>

<script>
function getPlatformLogo(platform){
  if(platform==='WhatsApp') return 'https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg';
  if(platform==='Telegram') return 'https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg';
  return '';
}

function submitGroup(){
  const title = document.getElementById('title').value.trim();
  const description = document.getElementById('description').value.trim();
  const link = document.getElementById('link').value.trim();
  const category = document.getElementById('category').value;
  const platform = document.getElementById('platform').value;

  if(!title || !link || !category || !platform){ alert("Fill all fields!"); return; }

  document.getElementById('loading').style.display='block';

  setTimeout(()=>{
    // save details in sessionStorage to pass to next page
    const groupData = { title, description, link, category, platform, image: getPlatformLogo(platform) };
    sessionStorage.setItem('groupData', JSON.stringify(groupData));
    window.location.href = 'details.html';
  }, 800);
}
</script>

</body>
</html>
