<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave</title>
<style>
body{margin:0;font-family:Arial;color:white;text-align:center;background:linear-gradient(180deg,#050508,#000);}
.logo-center{display:flex;flex-direction:column;align-items:center;}
.logo{width:70px;height:70px;border-radius:50%;animation:logoGlow 3s infinite alternate;}
@keyframes logoGlow{0%{box-shadow:0 0 10px #3a7bfd}100%{box-shadow:0 0 35px #a855f7}}
.title{font-size:32px;font-weight:bold;margin-top:6px;background:linear-gradient(45deg,#3a7bfd,#a855f7);-webkit-background-clip:text;color:transparent;}

#categoryScroll{margin-top:20px;display:flex;justify-content:center;gap:10px;overflow-x:auto;padding:10px;}
#subCategoryScroll{margin-top:10px;display:flex;justify-content:center;gap:8px;overflow-x:auto;padding:5px;}
.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;margin-top:20px;}
.card{width:200px;padding:15px;border-radius:15px;background:#111;border:1px solid #333;}
.card img{width:100%;border-radius:10px;}
.join{display:inline-block;margin-top:5px;padding:6px 14px;border-radius:20px;background:linear-gradient(45deg,#3a7bfd,#a855f7);color:white;text-decoration:none;}
#pagination{margin-top:30px;}
.page-btn{margin:5px;padding:8px 14px;border:none;border-radius:8px;background:#222;color:white;cursor:pointer;}
.page-btn.active{background:#3a7bfd;}
footer{margin-top:30px;padding:20px;background:#000;color:#aaa;}
</style>
</head>
<body>

<div class="logo-center">
<img class="logo" src="https://raw.githubusercontent.com/gaveshvimanshana25-blip/Gaveshmy/refs/heads/main/file_00000000fc0c72088645a465db760c82.png">
<div class="title">LinkWave</div>
</div>

<div id="categoryScroll">
<div data-platform="All">All</div>
<div data-platform="WhatsApp">WhatsApp</div>
<div data-platform="Telegram">Telegram</div>
<div data-platform="Facebook">Facebook</div>
</div>
<div id="subCategoryScroll"></div>
<div class="cards" id="cardsContainer"></div>
<div id="pagination"></div>

<footer>Made in Sri Lanka 🇱🇰 &copy; 2026 LinkWave</footer>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script>
// 🔹 Paste same Firebase config here too
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allLinks = [];
let currentPlatform="All";
let currentCategory="All";
let currentPage=1;
const linksPerPage=12;

function fetchLinks(){
  db.ref("links").orderByChild("timestamp").on("value", snapshot => {
    const data = snapshot.val() || {};
    allLinks = Object.values(data).reverse(); // newest first
    loadSubCategories("All");
    loadLinks();
  });
}

function loadLinks(){
  const container=document.getElementById("cardsContainer");
  container.innerHTML="";
  const filtered = allLinks.filter(l=>
    (currentPlatform==="All"||l.platform===currentPlatform)&&
    (currentCategory==="All"||l.category===currentCategory)
  );
  const start=(currentPage-1)*linksPerPage;
  const end=start+linksPerPage;
  filtered.slice(start,end).forEach(l =>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`${l.logo?`<img src="${l.logo}">`:''}<h3>${l.name}</h3><p>${l.description}</p><a class="join" href="${l.url}" target="_blank">Join</a>`;
    container.appendChild(card);
  });
  createPagination(filtered.length);
}

function createPagination(total){
  const pages=Math.ceil(total/linksPerPage);
  const pagination=document.getElementById("pagination");
  pagination.innerHTML="";
  for(let i=1;i<=pages;i++){
    const btn=document.createElement("button");
    btn.className="page-btn"+(i===currentPage?" active":"");
    btn.innerText=i;
    btn.onclick=function(){currentPage=i;loadLinks();}
    pagination.appendChild(btn);
  }
}

function loadSubCategories(platform){
  const sub=document.getElementById("subCategoryScroll");
  sub.innerHTML="";
  let cats=[];
  if(platform==="WhatsApp") cats=["All","Movies","Fun","Gaming","Education","Tech"];
  else if(platform==="Telegram") cats=["All","Movies","Crypto","Anime","Gaming"];
  else if(platform==="Facebook") cats=["All","Movies","Fun","Business","News"];
  else cats=["All"];
  cats.forEach(c=>{
    const d=document.createElement("div");
    d.innerText=c;
    d.onclick=function(){currentCategory=c;currentPage=1;loadLinks();}
    sub.appendChild(d);
  });
}

document.querySelectorAll("#categoryScroll div").forEach(btn=>{
  btn.onclick=function(){
    currentPlatform=this.dataset.platform;
    currentCategory="All";
    currentPage=1;
    loadSubCategories(currentPlatform);
    loadLinks();
  };
});

fetchLinks();

</script>
</body>
</html>
