<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave Developer</title>
<style>
/* BODY */
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:linear-gradient(180deg,#050508,#000);
  overflow-x:hidden;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.85);
  padding:15px;
  z-index:100;
}
.menu-icon{
  position:absolute;
  left:20px;
  top:20px;
  font-size:28px;
  cursor:pointer;
}
.dropdown{
  display:none;
  position:absolute;
  top:50px;
  left:15px;
  background:#000;
  border-radius:10px;
  padding:10px 0;
  min-width:180px;
  text-align:left;
}
.dropdown a{
  display:block;
  color:white;
  padding:10px 20px;
  text-decoration:none;
}
.dropdown a:hover{
  background:#222;
}

/* LOGO ANIMATION */
.logo-container{
  margin-top:50px;
}
.logo-container svg{
  width:120px;
  height:120px;
  transform-origin:50% 50%;
  animation: rotateLogo 4s linear infinite;
}
@keyframes rotateLogo{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* RED FILL */
.logo-fill{
  stroke-dasharray:251.2;
  stroke-dashoffset:251.2;
  animation: fillRed 2s forwards;
}
@keyframes fillRed{
  to{stroke-dashoffset:0;}
}

/* SPARK */
.spark{
  stroke-dasharray:10;
  stroke-dashoffset:10;
  opacity:0;
  animation: sparkAnim 2s 2s forwards; /* delay 2s after fill */
}
@keyframes sparkAnim{
  0%{opacity:0; stroke-dashoffset:10;}
  50%{opacity:1; stroke-dashoffset:0;}
  100%{opacity:0; stroke-dashoffset:0;}
}

/* NAME */
.dev-name{
  font-size:28px;
  font-weight:bold;
  margin-top:20px;
  background:linear-gradient(45deg,#3a7bfd,#a855f7);
  -webkit-background-clip:text;
  color:transparent;
  animation:nameWave 3s infinite;
}
@keyframes nameWave{
  0%{letter-spacing:1px}
  50%{letter-spacing:6px}
  100%{letter-spacing:1px}
}

/* SOCIAL PLATFORMS */
.socials{
  margin-top:30px;
  display:flex;
  justify-content:center;
  gap:20px;
}
.socials a{
  display:flex;
  align-items:center;
  justify-content:center;
  width:50px;
  height:50px;
  border-radius:50%;
  background:#111;
  color:white;
  font-size:24px;
  text-decoration:none;
  transition:0.3s;
}
.socials a:hover{
  transform:scale(1.2);
  background:linear-gradient(45deg,#3a7bfd,#a855f7);
}

/* DARK THEME CARD FOR PLATFORMS */
.platform-card{
  margin-top:40px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
}
.platform{
  width:150px;
  height:150px;
  border-radius:15px;
  background:#111;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:0.3s;
}
.platform img{
  width:50px;
  margin-bottom:10px;
}
.platform:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #3a7bfd;
}
</style>
</head>
<body>

<header>
<div class="menu-icon" onclick="toggleMenu()">☰</div>
<div class="dropdown" id="dropdownMenu">
  <a href="index.html">Home</a>
  <a href="submit.html">Submit Link</a>
  <a href="developer.html">Developer</a>
  <a href="contact.html">Contact</a>
  <a href="terms.html">Terms Service</a>
</div>
</header>

<!-- Logo + Spark -->
<div class="logo-container">
<svg viewBox="0 0 100 100">
  <!-- outer static circle -->
  <circle cx="50" cy="50" r="40" stroke="#3a7bfd" stroke-width="5" fill="transparent"/>
  <!-- animated red fill -->
  <circle class="logo-fill" cx="50" cy="50" r="40" stroke="red" stroke-width="5" fill="red"/>
  <!-- spark -->
  <circle class="spark" cx="50" cy="50" r="40" stroke="yellow" stroke-width="2" fill="none"/>
</svg>
</div>

<div class="dev-name">Gavesh Vimanshana</div>

<!-- Social Icons -->
<div class="socials">
  <a href="#" title="Facebook">F</a>
  <a href="#" title="YouTube">Y</a>
  <a href="#" title="TikTok">T</a>
  <a href="#" title="WhatsApp">W</a>
</div>

<!-- Platform Cards -->
<div class="platform-card">
  <div class="platform">
    <img src="https://img.icons8.com/color/48/000000/facebook-new.png" alt="">
    Facebook Channel
  </div>
  <div class="platform">
    <img src="https://img.icons8.com/color/48/000000/youtube-play.png" alt="">
    YouTube Channel
  </div>
  <div class="platform">
    <img src="https://img.icons8.com/color/48/000000/tiktok.png" alt="">
    TikTok Channel
  </div>
  <div class="platform">
    <img src="https://img.icons8.com/color/48/000000/whatsapp.png" alt="">
    WhatsApp Channel
  </div>
</div>

<script>
function toggleMenu(){
  const menu=document.getElementById("dropdownMenu");
  menu.style.display=(menu.style.display==="block")?"none":"block";
}
</script>

</body>
</html>
