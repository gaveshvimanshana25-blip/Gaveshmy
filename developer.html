<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer - LinkWave</title>
<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:linear-gradient(180deg,#050508,#000);
  text-align:center;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle,#3a7bfd22,#000 70%);
  animation:bgMove 20s linear infinite;
  z-index:-1;
}
@keyframes bgMove{
0%{transform:translate(0,0)}
50%{transform:translate(-20%,-20%)}
100%{transform:translate(0,0)}
}

/* Header */
header{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.85);
  padding:20px;
  z-index:100;
}
.menu-icon{
  position:absolute;
  left:20px;
  top:25px;
  font-size:28px;
  cursor:pointer;
}
.logo-center{
  display:flex;
  flex-direction:column;
  align-items:center;
}
.logo{
  width:70px;
  height:70px;
  border-radius:50%;
  animation:logoGlow 3s infinite alternate;
  transition:0.4s;
}
.logo:hover{
  transform:scale(1.1) rotate(360deg);
}
@keyframes logoGlow{
0%{box-shadow:0 0 10px #3a7bfd}
100%{box-shadow:0 0 35px #a855f7}
}
.title{
font-size:32px;
font-weight:bold;
margin-top:6px;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
-webkit-background-clip:text;
color:transparent;
animation:titleWave 3s infinite;
}
@keyframes titleWave{
0%{letter-spacing:1px}
50%{letter-spacing:6px}
100%{letter-spacing:1px}
}

/* dropdown */
.dropdown{
display:none;
position:absolute;
top:70px;
left:15px;
background:#000;
border-radius:10px;
padding:10px 0;
min-width:180px;
text-align:left;
}
.dropdown a{
display:block;
color:white;
padding:10px 20px;
text-decoration:none;
}
.dropdown a:hover{
background:#222;
}

/* Hero section */
.hero{
margin-top:30px;
animation:fadeUp 1s forwards;
}
@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* Main heading effect */
.dev-name{
font-size:36px;
font-weight:bold;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
-webkit-background-clip:text;
color:transparent;
animation:devWave 3s infinite;
margin-bottom:20px;
}
@keyframes devWave{
0%{letter-spacing:1px}
50%{letter-spacing:8px}
100%{letter-spacing:1px}
}

/* Platform cards */
.platforms{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}
.card{
width:180px;
padding:20px;
border-radius:15px;
background:#111;
border:1px solid #333;
transition:0.3s;
position:relative;
overflow:hidden;
}
.card:hover{
transform:scale(1.05) translateY(-5px);
box-shadow:0 0 20px #3a7bfd;
}
.card img{
width:50px;
height:50px;
margin-bottom:10px;
filter:invert(1); /* Dark theme icons */
}
.card h3{
margin:0;
margin-bottom:5px;
font-size:18px;
}
.card p{
font-size:14px;
color:#aaa;
}

/* Snow effect */
#snowContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:50;
}
.snowflake{
position:absolute;
top:-10px;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:fall linear infinite;
}
@keyframes fall{
to{transform:translateY(100vh);opacity:0;}
}
</style>
</head>
<body>
<header>
<div class="menu-icon" onclick="toggleMenu()">☰</div>
<div class="logo-center">
<img class="logo" src="https://raw.githubusercontent.com/gaveshvimanshana25-blip/Gaveshmy/refs/heads/main/file_00000000fc0c72088645a465db760c82.png">
<div class="title">LinkWave Developer</div>
</div>
<div class="dropdown" id="dropdownMenu">
<a href="index.html">Home</a>
<a href="submit.html">Submit Link</a>
<a href="#">Contact</a>
<a href="terms.html">Terms of Service</a>
</div>
</header>

<div class="hero">
<h1 class="dev-name">Your Name Here</h1>
<p>Platforms & Channels</p>
</div>

<div class="platforms">
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook">
<h3>Facebook</h3>
<p>Follow my page</p>
</div>
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/42/YouTube_icon_%282013-2017%29.png" alt="YouTube">
<h3>YouTube</h3>
<p>Subscribe to channel</p>
</div>
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/TikTok_logo.svg" alt="TikTok">
<h3>TikTok</h3>
<p>Follow my profile</p>
</div>
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
<h3>WhatsApp</h3>
<p>Join channel</p>
</div>
</div>

<footer>
Made in Sri Lanka 🇱🇰 <br>
© 2026 LinkWave
</footer>

<div id="snowContainer"></div>

<script>
function toggleMenu(){
  const menu=document.getElementById("dropdownMenu");
  menu.style.display=(menu.style.display==="block")?"none":"block";
}

/* Snow effect */
function createSnowflakes(count){
  const container=document.getElementById("snowContainer");
  for(let i=0;i<count;i++){
    const flake=document.createElement('div');
    flake.className='snowflake';
    flake.style.left=Math.random()*100+'vw';
    flake.style.animationDuration=(3+Math.random()*5)+'s';
    container.appendChild(flake);
    flake.addEventListener('animationend',()=>{flake.remove();createSnowflakes(1);});
  }
}
createSnowflakes(50);
</script>
</body>
</html>
