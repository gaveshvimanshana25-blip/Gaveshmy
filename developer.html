<title>Developer - LinkWave</title><style>
body{
margin:0;
font-family:Arial;
color:white;
background:linear-gradient(180deg,#050508,#000);
text-align:center;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#3a7bfd22,#000 70%);
animation:bgMove 20s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{transform:translate(0,0)}
50%{transform:translate(-20%,-20%)}
100%{transform:translate(0,0)}
}

/* Header */

header{
position:sticky;
top:0;
background:rgba(0,0,0,0.85);
padding:20px;
z-index:100;
}

.menu-icon{
position:absolute;
left:20px;
top:25px;
font-size:28px;
cursor:pointer;
}

.logo-center{
display:flex;
flex-direction:column;
align-items:center;
}

.logo{
width:70px;
height:70px;
border-radius:50%;
animation:logoGlow 3s infinite alternate;
}

@keyframes logoGlow{
0%{box-shadow:0 0 10px #3a7bfd}
100%{box-shadow:0 0 35px #a855f7}
}

.title{
font-size:32px;
font-weight:bold;
margin-top:6px;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
-webkit-background-clip:text;
color:transparent;
}

.dropdown{
display:none;
position:absolute;
top:70px;
left:15px;
background:#000;
border-radius:10px;
padding:10px 0;
min-width:180px;
text-align:left;
}

.dropdown a{
display:block;
color:white;
padding:10px 20px;
text-decoration:none;
}

.dropdown a:hover{
background:#222;
}

/* Hero */

.hero{
margin-top:30px;
}

.dev-name{
font-size:36px;
font-weight:bold;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
-webkit-background-clip:text;
color:transparent;
}

/* Cards */

.platforms{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.platform-link{
text-decoration:none;
color:white;
}

.card{
width:180px;
padding:20px;
border-radius:15px;
background:#111;
border:1px solid #333;
transition:0.3s;
}

.card:hover{
transform:scale(1.05) translateY(-5px);
box-shadow:0 0 20px #3a7bfd;
}

.card img{
width:50px;
margin-bottom:10px;
}

.card h3{
margin:0;
margin-bottom:5px;
}

.card p{
font-size:14px;
color:#aaa;
}

/* Snow */

#snowContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.snowflake{
position:absolute;
top:-10px;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(100vh);opacity:0;}
}

</footer><div id="snowContainer"></div><script>

function toggleMenu(){
const menu=document.getElementById("dropdownMenu");
menu.style.display=(menu.style.display==="block")?"none":"block";
}

function createSnowflakes(count){

const container=document.getElementById("snowContainer");

for(let i=0;i<count;i++){

const flake=document.createElement("div");
flake.className="snowflake";
flake.style.left=Math.random()*100+"vw";
flake.style.animationDuration=(3+Math.random()*5)+"s";

container.appendChild(flake);

flake.addEventListener("animationend",()=>{
flake.remove();
createSnowflakes(1);
});

}

}

createSnowflakes(50);

</script></body>
