<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer - LinkWave</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#050508,#000);
  color:white;
  text-align:center;
  overflow-x:hidden;
  position:relative;
}

/* Floating background radial */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle,#3a7bfd22,#000 70%);
  animation:bgMove 20s linear infinite;
  z-index:-1;
}
@keyframes bgMove{
  0%{transform:translate(0,0)}
  50%{transform:translate(-20%, -20%)}
  100%{transform:translate(0,0)}
}

/* Header */
header{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:15px 25px;
  background:rgba(0,0,0,0.85);
  position:sticky;
  top:0;
  z-index:100;
}
.logo{
  width:50px;
  height:50px;
  border-radius:50%;
  box-shadow:0 0 15px #3a7bfd;
  animation:logoGlow 3s infinite alternate;
}
@keyframes logoGlow{
  0%{box-shadow:0 0 10px #3a7bfd}
  100%{box-shadow:0 0 30px #a855f7}
}
.title{
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(45deg,#3a7bfd,#a855f7);
  -webkit-background-clip:text;
  color:transparent;
  animation:waveText 3s infinite;
}
@keyframes waveText{
  0%{letter-spacing:1px}
  50%{letter-spacing:5px}
  100%{letter-spacing:1px}
}

/* Hero */
.hero{
  margin-top:40px;
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1s forwards;
}
.hero p{
  color:#aaa;
  max-width:600px;
  margin:auto;
}
@keyframes fadeUp{
  to{opacity:1; transform:translateY(0);}
}

/* Developer Cards */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}
.card{
  width:200px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.4s;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:-100%;
  background:linear-gradient(120deg,#3a7bfd44,#a855f744,#3a7bfd44);
  transition:0.5s;
}
.card:hover::before{
  left:100%;
}
.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 10px 25px rgba(58,127,253,0.5);
}
.card img{
  width:80px;
  height:80px;
  border-radius:50%;
  margin-bottom:10px;
  border:2px solid #3a7bfd;
  transition:0.4s;
}
.card:hover img{
  transform:scale(1.1) rotate(5deg);
}
.card h3{
  margin:10px 0 5px;
  transition:0.3s;
}
.card:hover h3{
  color:#3a7bfd;
}
.card p{
  font-size:14px;
  color:#ccc;
}

/* Footer */
footer{
  margin-top:50px;
  padding:20px;
  background:#000;
  color:#aaa;
}

/* Particle effect (falling stars) */
.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  opacity:0.8;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-10px); opacity:1;}
  100%{transform:translateY(100vh); opacity:0;}
}
</style>
</head>
<body>

<header>
  <div><img class="logo" src="https://cdn-icons-png.flaticon.com/512/942/942748.png"></div>
  <div class="title">LinkWave Developer</div>
</header>

<div class="hero">
  <h1>Meet the Developers</h1>
  <p>Our team builds LinkWave with love, speed & reliability.</p>
</div>

<div class="cards">
  <div class="card">
    <img src="https://i.pravatar.cc/150?img=10" alt="Developer 1">
    <h3>Gavesh</h3>
    <p>Full-stack Developer | Founder</p>
  </div>
  <div class="card">
    <img src="https://i.pravatar.cc/150?img=12" alt="Developer 2">
    <h3>Anika</h3>
    <p>UI/UX Designer | Frontend Dev</p>
  </div>
  <div class="card">
    <img src="https://i.pravatar.cc/150?img=15" alt="Developer 3">
    <h3>Rohan</h3>
    <p>Backend Developer | DevOps</p>
  </div>
</div>

<footer>
  © 2026 LinkWave | Designed by the Dev Team
</footer>

<script>
// Particle stars
for(let i=0;i<50;i++){
  const star=document.createElement("div");
  star.className="star";
  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*-100+"vh";
  star.style.width=Math.random()*3+2+"px";
  star.style.height=star.style.width;
  star.style.animationDuration=5+Math.random()*5+"s";
  document.body.appendChild(star);
}
</script>

</body>
</html>
