<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Developer - LinkWave</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0a0a0a; /* dark black */
  color:white;
  text-align:center;
  padding:20px;
  line-height:1.6;
}
h1,h2,h3{color:#ff4c4c;} /* red headers */
a{color:#ff6b6b;text-decoration:none;}

section{margin-bottom:30px;}

/* Animated Icon */
.icon {
  display:inline-block;
  margin-right:10px;
  animation: spin 2s linear infinite;
  font-size:32px;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

footer{
  margin-top:50px;
  font-size:14px;
  color:#aaa;
  text-align:center;
}
button{
  padding:12px 24px;
  border:none;
  border-radius:15px;
  background:#ff4c4c;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
  transition: transform 0.2s;
}
button:hover{
  transform: scale(1.1);
}

</style>
</head>
