<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave - Developer</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: linear-gradient(180deg,#050508,#000);
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* Floating background animation */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle,#3a7bfd22,#000 70%);
  animation:bgMove 20s linear infinite;
  z-index:-1;
}
@keyframes bgMove{
  0%{transform:translate(0,0);}
  50%{transform:translate(-20%, -20%);}
  100%{transform:translate(0,0);}
}

/* Header */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 25px;
  background:rgba(0,0,0,0.85);
  position:sticky;
  top:0;
  z-index:100;
}
.menu-icon{
  font-size:28px;
  cursor:pointer;
}
.dropdown{
  display:none;
  position:absolute;
  top:55px;
  left:15px;
  background:rgba(0,0,0,0.95);
  border:1px solid #333;
  border-radius:10px;
  padding:10px 0;
  min-width:180px;
  text-align:left;
  z-index:1000;
}
.dropdown a{
  display:block;
  color:white;
  padding:10px 20px;
  text-decoration:none;
}
.dropdown a:hover{
  background:rgba(58,127,253,0.2);
}

/* Title & Logo */
.logo{
  width:60px;
  height:60px;
  border-radius:50%;
  box-shadow:0 0 15px #3a7bfd;
  transition:0.3s;
}
.logo:hover{
  transform: scale(1.3) rotate(20deg);
  box-shadow:0 0 30px #a855f7, 0 0 50px #3a7bfd;
}
.title{
  font-size:32px;
  font-weight:bold;
  background:linear-gradient(45deg,#3a7bfd,#a855f7);
  -webkit-background-clip:text;
  color:transparent;
  animation:waveText 3s infinite;
}
@keyframes waveText{
  0%{letter-spacing:1px;}
  50%{letter-spacing:5px;}
  100%{letter-spacing:1px;}
}

/* Hero */
.hero{
  margin-top:30px;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 1s forwards;
}
.hero p{
  color:#aaa;
  max-width:600px;
  margin:auto;
}
@keyframes fadeUp{
  to{opacity:1; transform:translateY(0);}
}

/* Developer Card */
.dev-container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:40px;
}
.dev-card{
  width:220px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.dev-card:hover{
  transform:scale(1.05) translateY(-10px);
  box-shadow:0 10px 25px rgba(58,127,253,0.5);
}
.dev-card img{
  width:100px;
  height:100px;
  border-radius:50%;
  margin-bottom:10px;
  transition: transform 0.3s, box-shadow 0.3s;
}
.dev-card h3{
  margin:5px 0;
}
.dev-card p{
  font-size:14px;
  color:#ccc;
}

/* Footer */
footer{
  margin-top:50px;
  padding:20px;
  background:#000;
  color:#aaa;
}
</style>
</head>
<body>

<header>
  <div class="menu-icon" onclick="toggleMenu()">☰</div>
  <div><img class="logo" src="https://cdn-icons-png.flaticon.com/512/942/942748.png" alt="Logo"></div>
  <div class="title">LinkWave</div>

  <div class="dropdown" id="dropdownMenu">
    <a href="index.html">Home</a>
    <a href="submit.html">Submit Link</a>
    <a href="analytics.html">Live Analytics</a>
    <a href="developer.html">Developer</a>
    <a href="contact.html">Contact</a>
  </div>
</header>

<div class="hero">
  <h1>Meet the Developer</h1>
  <p>This is the main developer behind LinkWave. Hover over the logo for a cool effect!</p>
</div>

<div class="dev-container" id="devContainer"></div>

<footer>
Made in Sri Lanka 🇱🇰 <br>
© 2026 LinkWave
</footer>

<script>
// Menu toggle
function toggleMenu(){
  const menu=document.getElementById("dropdownMenu");
  menu.style.display=(menu.style.display==="block")?"none":"block";
}
window.onclick=function(e){
  if(!e.target.matches('.menu-icon')){
    const menu=document.getElementById("dropdownMenu");
    if(menu.style.display==="block") menu.style.display="none";
  }
}

// Developer Data (only your info, no other devs)
const devs = [
  {
    name: "Tharindu Gavesh",
    role: "Full Stack Developer",
    logo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
    bio: "Creator and maintainer of LinkWave. Passionate about web design and animations."
  }
];

// Load Developer Card
function loadDevelopers(){
  const container = document.getElementById("devContainer");
  container.innerHTML="";
  devs.forEach(dev=>{
    const card = document.createElement("div");
    card.className="dev-card";
    card.innerHTML=`
      <img src="${dev.logo}" alt="${dev.name}">
      <h3>${dev.name}</h3>
      <p><b>${dev.role}</b></p>
      <p>${dev.bio}</p>
    `;
    container.appendChild(card);
  });
}

window.onload = function(){
  loadDevelopers();
};
</script>

</body>
</html>
