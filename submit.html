<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Link - LinkWave</title>
<style>
body{margin:0;font-family:Arial;color:white;text-align:center;background:linear-gradient(180deg,#050508,#000);overflow-x:hidden;}
header{position:sticky;top:0;background:rgba(0,0,0,0.85);padding:20px;z-index:100;}
.logo-center{display:flex;flex-direction:column;align-items:center;}
.logo{width:70px;height:70px;border-radius:50%;}
input, textarea{width:80%;padding:10px;margin:8px 0;border-radius:10px;border:none;}
button{padding:10px 20px;border:none;border-radius:20px;background:linear-gradient(45deg,#3a7bfd,#a855f7);color:white;font-weight:bold;cursor:pointer;}
</style>
</head>
<body>

<header>
<div class="logo-center">
<img class="logo" src="https://raw.githubusercontent.com/gaveshvimanshana25-blip/Gaveshmy/refs/heads/main/file_00000000fc0c72088645a465db760c82.png">
<div class="title">LinkWave Submit</div>
</div>
</header>

<h2>Submit Your Group</h2>

<form id="submitForm">
<input type="text" id="groupName" placeholder="Group Name" required><br>
<input type="text" id="groupUrl" placeholder="Group URL" required><br>
<input type="text" id="groupLogo" placeholder="Logo URL (optional)"><br>
<textarea id="groupDesc" placeholder="Description"></textarea><br>
<button type="submit">Submit</button>
</form>

<script>
// Ensure user has unique ID
let userId = localStorage.getItem("linkwaveUserId");
if(!userId){
    userId = "user_" + Date.now() + Math.floor(Math.random()*1000);
    localStorage.setItem("linkwaveUserId", userId);
}

// Form submit handler
document.getElementById("submitForm").addEventListener("submit", function(e){
    e.preventDefault();
    const name = document.getElementById("groupName").value;
    const url = document.getElementById("groupUrl").value;
    const logo = document.getElementById("groupLogo").value;
    const desc = document.getElementById("groupDesc").value;

    const links = JSON.parse(localStorage.getItem("linkwaveLinks"))||[];
    links.push({
        userId: userId,
        name: name,
        url: url,
        logo: logo,
        description: desc
    });
    localStorage.setItem("linkwaveLinks", JSON.stringify(links));
    alert("Your group has been submitted!");
    this.reset();
});
</script>

</body>
</html>
