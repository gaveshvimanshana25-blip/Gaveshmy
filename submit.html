<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Link - LinkWave</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(180deg,#0a0a0f,#000);
}

/* animated background */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#3a7bfd22,#000 70%);
animation:bgMove 20s linear infinite;
z-index:-1;
}

@keyframes bgMove{
0%{transform:translate(0,0)}
50%{transform:translate(-20%,-20%)}
100%{transform:translate(0,0)}
}

/* header */

header{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
padding:20px;
}

.logo{
width:55px;
border-radius:50%;
box-shadow:0 0 20px #3a7bfd;
}

.title{
font-size:32px;
font-weight:bold;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
-webkit-background-clip:text;
color:transparent;
}

/* form container */

.form-box{
width:320px;
margin:40px auto;
padding:30px;
border-radius:15px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
animation:fadeUp 1s;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(30px)}
to{opacity:1; transform:translateY(0)}
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

textarea{
resize:none;
}

/* submit button */

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#3a7bfd,#a855f7);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #a855f7;
}

/* success message */

#success{
margin-top:10px;
color:#4ade80;
display:none;
}

</style>
</head>

<body>

<header>

<img class="logo" src="https://cdn-icons-png.flaticon.com/512/942/942748.png">

<div class="title">LinkWave</div>

</header>

<div class="form-box">

<h2>Submit Your Group</h2>

<input id="name" placeholder="Group Name">

<textarea id="description" placeholder="Description"></textarea>

<input id="url" placeholder="Group Link">

<input id="logo" placeholder="Logo Image URL (optional)">

<select id="platform">

<option>WhatsApp</option>
<option>Telegram</option>
<option>Facebook</option>
<option>TikTok</option>

</select>

<select id="category">

<option>Movies</option>
<option>Fun</option>
<option>Gaming</option>
<option>Education</option>
<option>Tech</option>
<option>Business</option>

</select>

<button onclick="submitLink()">Submit</button>

<div id="success">✔ Link Submitted!</div>

</div>

<script>

function submitLink(){

const name=document.getElementById("name").value
const description=document.getElementById("description").value
const url=document.getElementById("url").value
const logo=document.getElementById("logo").value
const platform=document.getElementById("platform").value
const category=document.getElementById("category").value

if(!name||!url){

alert("Please fill required fields")

return

}

const links=JSON.parse(localStorage.getItem("linkwaveLinks"))||[]

links.push({
name:name,
description:description,
url:url,
logo:logo,
platform:platform,
category:category
})

localStorage.setItem("linkwaveLinks",JSON.stringify(links))

document.getElementById("success").style.display="block"

document.querySelectorAll("input,textarea").forEach(el=>el.value="")

}

</script>

</body>
</html>
