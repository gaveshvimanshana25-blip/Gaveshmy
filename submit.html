<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Link - LinkWave</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo-center">
    <img class="logo" src="https://raw.githubusercontent.com/gaveshvimanshana25-blip/Gaveshmy/refs/heads/main/file_00000000fc0c72088645a465db760c82.png">
    <div class="title">LinkWave</div>
  </div>
</header>

<div class="hero">
  <h1>Submit Your Link</h1>
  <p>Share WhatsApp, Telegram, Facebook groups with the community.</p>
</div>

<form id="submitForm">
  <input type="text" id="name" placeholder="Group Name" required><br><br>
  <input type="text" id="url" placeholder="Group URL" required><br><br>
  <input type="text" id="platform" placeholder="Platform (WhatsApp/Telegram/Facebook)" required><br><br>
  <input type="text" id="category" placeholder="Category (Movies/Gaming/Fun...)" required><br><br>
  <input type="text" id="logo" placeholder="Logo URL (optional)"><br><br>
  <button type="submit">Submit</button>
</form>

<div id="successMessage" style="display:none;color:lime;margin-top:15px;">Link submitted successfully!</div>

<script src="script.js"></script>
</body>
</html>
