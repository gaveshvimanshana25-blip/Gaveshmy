<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkWave - Submit Link</title>
<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:linear-gradient(180deg,#050508,#000);
  text-align:center;
}
header{
  padding:20px;
  background:rgba(0,0,0,0.85);
}
.logo{
  width:60px;
  height:60px;
  border-radius:50%;
  margin-bottom:10px;
  transition:0.3s;
}
.logo:hover{
  transform:scale(1.1);
}
form{
  margin:30px auto;
  padding:20px;
  background:#111;
  border-radius:15px;
  max-width:400px;
  display:flex;
  flex-direction:column;
  gap:15px;
}
input, select, textarea{
  padding:10px;
  border-radius:8px;
  border:none;
  background:#222;
  color:white;
}
button{
  padding:12px;
  border-radius:30px;
  border:none;
  background:linear-gradient(45deg,#3a7bfd,#a855f7);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.05);
}
#logoPreview{
  width:80px;
  height:80px;
  margin:auto;
  border-radius:50%;
  border:2px solid #3a7bfd;
  display:block;
  object-fit:cover;
}
</style>
</head>
<body>

<header>
  <img class="logo" src="https://raw.githubusercontent.com/gaveshvimanshana25-blip/Gaveshmy/refs/heads/main/file_00000000fc0c72088645a465db760c82.png" alt="LinkWave">
  <h2>Submit Your Group</h2>
</header>

<form id="submitForm">
  <label>Group Name</label>
  <input type="text" id="groupName" placeholder="Enter group name" required>

  <label>Group URL</label>
  <input type="url" id="groupURL" placeholder="https://..." required>

  <label>Platform</label>
  <select id="platformSelect" required>
    <option value="">Select platform</option>
    <option value="WhatsApp">WhatsApp</option>
    <option value="Telegram">Telegram</option>
    <option value="Facebook">Facebook</option>
  </select>

  <label>Category</label>
  <select id="categorySelect" required>
    <option value="">Select category</option>
  </select>

  <label>Logo (optional)</label>
  <input type="file" id="logoInput" accept="image/*">
  <img id="logoPreview" src="" alt="Logo Preview">

  <label>Description</label>
  <textarea id="groupDesc" placeholder="Write description..." rows="3"></textarea>

  <button type="submit">Submit Link</button>
</form>

<script>
const platformSelect = document.getElementById("platformSelect");
const categorySelect = document.getElementById("categorySelect");
const logoInput = document.getElementById("logoInput");
const logoPreview = document.getElementById("logoPreview");

const categories = {
  "WhatsApp":["Movies","Fun","Gaming","Education","Tech"],
  "Telegram":["Movies","Crypto","Anime","Gaming"],
  "Facebook":["Movies","Fun","Business","News"]
};

// Dynamic category update
platformSelect.addEventListener("change", ()=>{
  const plat = platformSelect.value;
  categorySelect.innerHTML='<option value="">Select category</option>';
  if(categories[plat]){
    categories[plat].forEach(cat=>{
      const opt = document.createElement("option");
      opt.value=cat;
      opt.innerText=cat;
      categorySelect.appendChild(opt);
    });
  }
});

// Logo preview
logoInput.addEventListener("change",()=>{
  const file = logoInput.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = e=>{
      logoPreview.src = e.target.result;
    }
    reader.readAsDataURL(file);
  } else {
    logoPreview.src="";
  }
});

// Form submission
document.getElementById("submitForm").addEventListener("submit", e=>{
  e.preventDefault();
  const links = JSON.parse(localStorage.getItem("linkwaveLinks")) || [];
  const newLink = {
    name: document.getElementById("groupName").value,
    url: document.getElementById("groupURL").value,
    platform: platformSelect.value,
    category: categorySelect.value,
    description: document.getElementById("groupDesc").value,
    logo: logoPreview.src || ""
  };
  links.push(newLink);
  localStorage.setItem("linkwaveLinks", JSON.stringify(links));
  alert("Link submitted successfully!");
  e.target.reset();
  logoPreview.src="";
});
</script>

</body>
</html>
