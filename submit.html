<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Link - LinkWave</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#000000,#0a0a0f);color:white;text-align:center;}
form{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);padding:30px;border-radius:15px;width:90%;max-width:400px;margin:50px auto;border:1px solid rgba(255,255,255,0.1);}
input, select, textarea{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:none;background:rgba(255,255,255,0.1);color:white;}
input::placeholder, textarea::placeholder{color:#ccc;}
button{padding:14px 28px;border-radius:30px;background:linear-gradient(45deg,#3a7bfd,#a855f7);color:white;border:none;font-weight:bold;cursor:pointer;box-shadow:0 0 20px rgba(120,80,255,0.7);}
h1{margin-top:30px;font-size:32px;}
</style>
</head>
<body>

<h1>Submit Your Group Link</h1>

<form id="submitForm">
  <input type="text" placeholder="Group Name" required id="groupName">
  <input type="url" placeholder="Group Link (WhatsApp/Telegram)" required id="groupURL">
  <select required id="groupPlatform">
    <option value="">Select Platform</option>
    <option value="WhatsApp">WhatsApp</option>
    <option value="Telegram">Telegram</option>
    <option value="Discord">Discord</option>
  </select>
  <textarea placeholder="Short Description" rows="4" required id="groupDesc"></textarea>
  <button type="submit">Submit Link</button>
</form>

<script>
document.getElementById('submitForm').addEventListener('submit', function(e){
  e.preventDefault();
  const name = document.getElementById('groupName').value;
  const url = document.getElementById('groupURL').value;
  const platform = document.getElementById('groupPlatform').value;
  const desc = document.getElementById('groupDesc').value;

  const link = {name:name,url:url,platform:platform,description:desc};
  let links = JSON.parse(localStorage.getItem('linkwaveLinks')) || [];
  links.push(link);
  localStorage.setItem('linkwaveLinks', JSON.stringify(links));

  alert("Thank you! Your link has been submitted.");
  this.reset();
});
</script>

</body>
</html>
